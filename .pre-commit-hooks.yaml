# Hook definitions for the pre-commit framework (https://pre-commit.com).
#
# Consumer repos reference these hooks from their own .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/lgtm-hq/py-lintro
#       rev: v0.69.0  # pin to a released tag
#       hooks:
#         - id: lintro-check
#         # - id: lintro-format  # opt in for auto-formatting
#
# See docs/pre-commit.md for full usage guidance.
- id: lintro-check
  name: lintro check
  description: Run lintro quality checks on the staged files.
  entry: lintro check
  language: python
  types: [file]
  require_serial: true
- id: lintro-format
  name: lintro format
  description: Run lintro auto-formatting on the staged files.
  entry: lintro format
  language: python
  types: [file]
  require_serial: true
