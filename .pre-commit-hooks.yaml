# Hook definitions for the pre-commit framework (https://pre-commit.com).
#
# Consumer repos reference these hooks from their own .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/lgtm-hq/py-lintro
#       rev: v0.69.0  # pin to a released tag
#       hooks:
#         - id: lintro-check
#         # - id: lintro-format  # opt in for auto-formatting
#
# The default hooks use `language: system` and expect lintro on PATH
# (uv tool install lintro / brew install lintro / npm i -g lintro).
# lintro is written in Python but it's not a Python-only tool: it drives
# native binaries (hadolint, shellcheck, ...) that a pip-isolated hook env
# cannot provide, so a system install is the default experience.
#
# The `-python` variants let pre-commit build an isolated Python env with
# lintro installed from the pinned rev instead — hermetic, but limited to
# lintro's Python-based tools. See docs/pre-commit.md.
---
- id: lintro-check
  name: lintro check
  description: Run lintro quality checks on the staged files (system lintro).
  entry: lintro check
  language: system
  types: [file]
  require_serial: true
- id: lintro-format
  name: lintro format
  description: Run lintro auto-formatting on the staged files (system lintro).
  entry: lintro format
  language: system
  types: [file]
  require_serial: true
- id: lintro-check-python
  name: lintro check (isolated python env)
  description: >-
    Run lintro quality checks in a pre-commit-managed Python env
    (Python-based tools only). Installs the ``full`` extra so ruff,
    black, mypy, bandit, pydoclint, and yamllint are present.
  entry: lintro check
  language: python
  types: [file]
  require_serial: true
  additional_dependencies: ['.[full]']
- id: lintro-format-python
  name: lintro format (isolated python env)
  description: >-
    Run lintro auto-formatting in a pre-commit-managed Python env
    (Python-based tools only). Installs the ``full`` extra so the
    Python formatters are present.
  entry: lintro format
  language: python
  types: [file]
  require_serial: true
  additional_dependencies: ['.[full]']
