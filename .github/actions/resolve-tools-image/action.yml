---
name: Resolve Tools Image
description: >-
  Detect tool file changes and resolve the appropriate tools image reference.
  Returns the stable pinned image for contexts that do not provide a freshly
  built workflow_call image. Callers that need a fresh gate image for PR or
  merge queue validation should call tools-image.yml via workflow_call and pass
  the result context to tools-image-resolve.sh directly (see ci-pipeline.yml).
inputs:
  image-name:
    description: Base image name without tag
    required: false
    default: ghcr.io/lgtm-hq/lintro-tools
  stable-image:
    description: >-
      Override the stable image reference. If unset, tools-image-resolve.sh reads
      the pinned digest from Dockerfile automatically.
    required: false
    default: ''
outputs:
  image:
    description: Full tools image reference to use
    value: ${{ steps.resolve.outputs.image }}
  source:
    description: Where the image comes from (registry, artifact, or stable)
    value: ${{ steps.resolve.outputs.source }}
  changed:
    description: Whether tool files changed in this event
    value: ${{ steps.filter.outputs.tools_changed }}
runs:
  using: composite
  steps:
    - name: Check for tool file changes
      id: filter
      shell: bash
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: >-
          ${{ github.event.pull_request.base.sha ||
          github.event.merge_group.base_sha ||
          github.event.merge_group.base_commit_oid }}
        PR_HEAD_SHA: >-
          ${{ github.event.pull_request.head.sha ||
          github.event.merge_group.head_sha ||
          github.event.merge_group.head_commit_oid }}
        GITHUB_EVENT_BEFORE: ${{ github.event.before }}
      run: scripts/ci/tools-image-detect-changes.sh

    - name: Resolve image tag
      id: resolve
      shell: bash
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        IMAGE_NAME: ${{ inputs.image-name }}
        STABLE_IMAGE: ${{ inputs.stable-image }}
        TOOLS_CHANGED: ${{ steps.filter.outputs.tools_changed }}
      run: scripts/ci/tools-image-resolve.sh
