# Configuration for actions/labeler
# Maps file paths to labels for automatic PR labeling.
#
# Size labels (size:XS … size:XL) are NOT path-based — they are applied by
# `.github/workflows/pr-size.yml` via `scripts/ci/pr-size-label.py` (canonical
# colors/descriptions live in SIZE_LABEL_DEFS in that script).
---
enhancement:
  - changed-files:
      - any-glob-to-any-file:
          - 'lintro/**'
          - 'tests/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/actions/**'
          - 'scripts/ci/**'
          - 'scripts/docker/**'
          - 'Dockerfile'
          - 'docker-compose.yml'
          - '.dockerignore'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - 'README.md'
          - 'CHANGELOG.md'
          - '**/*.md'
          - '!.github/**/*.md'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'pyproject.toml'
          - 'uv.lock'
          - 'requirements*.txt'

maintenance:
  - changed-files:
      - any-glob-to-any-file:
          - 'scripts/utils/**'
          - 'scripts/local/**'
          - '.github/CODEOWNERS'
          - '.github/labeler.yml'
          - 'renovate.json'

security:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/*security*.yml'
          - '.github/workflows/*codeql*.yml'
          - 'lintro/tools/bandit.py'
          - 'lintro/tools/gitleaks.py'
          - 'lintro/tools/semgrep.py'
