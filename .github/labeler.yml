# Configuration for actions/labeler
# Maps file paths to labels for automatic PR labeling
---
enhancement:
  - changed-files:
      - any-glob-to-any-file:
          - 'lintro/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/actions/**'
          - 'scripts/ci/**'
          - 'scripts/docker/**'
          - 'Dockerfile'
          - 'docker-compose.yml'
          - '.dockerignore'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - 'README.md'
          - 'CHANGELOG.md'
          - '**/*.md'
          - '!.github/**/*.md'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'pyproject.toml'
          - 'uv.lock'
          - 'requirements*.txt'

maintenance:
  - changed-files:
      - any-glob-to-any-file:
          - 'scripts/utils/**'
          - 'scripts/local/**'
          - '.github/CODEOWNERS'
          - '.github/labeler.yml'
          - 'renovate.json'

security:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/*security*.yml'
          - '.github/workflows/*codeql*.yml'
          - 'lintro/tools/bandit.py'
          - 'lintro/tools/gitleaks.py'
          - 'lintro/tools/semgrep.py'

testing:
  - changed-files:
      - any-glob-to-any-file:
          - 'tests/**'
          - 'pytest.ini'
          - 'tox.ini'
          - 'test_samples/**'
          - 'scripts/ci/testing/**'

release:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/release-*.yml'
          - '.github/workflows/publish-*.yml'
          - '.github/workflows/build-binary.yml'
          - 'CHANGELOG.md'
          - 'scripts/ci/release/**'
          - 'scripts/ci/homebrew/**'

docker:
  - changed-files:
      - any-glob-to-any-file:
          - 'Dockerfile'
          - 'docker-compose.yml'
          - '.dockerignore'
          - '.github/workflows/docker-*.yml'
          - '.github/workflows/ghcr-*.yml'
          - 'scripts/docker/**'

infrastructure:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/actions/**'
          - 'scripts/ci/**'
          - 'renovate.json'
          - '.allstar/**'
