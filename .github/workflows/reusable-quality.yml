---
name: Reusable - Quality Gate & Version Export
# Reusable workflow for quality checks and version extraction.
# Sets up Python/uv environment, installs external tools, runs lintro check,
# and exports project version for downstream workflows.

'on':
  workflow_call:
    outputs:
      version:
        description: Project version from pyproject.toml
        value: ${{ jobs.quality.outputs.version }}

permissions: {}

jobs:
  quality:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 20
    outputs:
      version: ${{ steps.version.outputs.version }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            docker.io:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            pypi.org:443
            files.pythonhosted.org:443
            api.osv.dev:443
            api.deps.dev:443
            static.rust-lang.org:443
            bun.sh:443
            astral.sh:443
            releases.astral.sh:443
            sh.rustup.rs:443
            registry.npmjs.org:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443
            semgrep.dev:443
            metrics.semgrep.dev:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Environment setup
        uses: ./.github/actions/setup-env
        with:
          python-version: '3.14'

      - name: Verify generated tool versions
        run: python3 scripts/ci/generate-tool-versions.py --check

      - name: Sync dependencies
        run: uv sync --dev --no-progress

      - name: Quality gate
        id: version
        run: scripts/ci/testing/reusable-quality-entry.sh
