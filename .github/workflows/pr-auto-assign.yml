---
name: PR - Auto Assign

'on':
  pull_request_target:
    types: [opened]

permissions: {}

jobs:
  assign:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-auto-assign.yml@d9b302c919efc84fc001e9f3ef63bc9061d04b8f
    with:
      codeowners-path: .github/CODEOWNERS
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
      tooling-ref: 'd9b302c919efc84fc001e9f3ef63bc9061d04b8f'
    permissions:
      contents: read
      pull-requests: write
