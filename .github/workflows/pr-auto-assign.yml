---
name: PR - Auto Assign

'on':
  pull_request_target:
    types: [opened]

permissions: {}

jobs:
  assign:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-auto-assign.yml@9416eb2bf71539bcc355e1dcf463a533a0924d74 # v0.55.0
    with:
      codeowners-path: .github/CODEOWNERS
      tooling-ref: '9416eb2bf71539bcc355e1dcf463a533a0924d74' # v0.55.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
