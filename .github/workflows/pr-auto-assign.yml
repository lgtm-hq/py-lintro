---
name: PR - Auto Assign

'on':
  pull_request_target:
    types: [opened]

permissions: {}

jobs:
  assign:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-auto-assign.yml@78a5255d51dc2e1e061e4103a95f3ca0c646275d # v0.32.1
    with:
      codeowners-path: .github/CODEOWNERS
      tooling-ref: '78a5255d51dc2e1e061e4103a95f3ca0c646275d' # v0.32.1
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
