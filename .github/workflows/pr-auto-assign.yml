---
name: PR - Auto Assign

'on':
  pull_request_target:
    types: [opened]

permissions: {}

jobs:
  assign:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-auto-assign.yml@80dbd2fc1568963da3bc24c468ff2221ff71b904
    with:
      codeowners-path: .github/CODEOWNERS
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
      tooling-ref: '80dbd2fc1568963da3bc24c468ff2221ff71b904'
    permissions:
      contents: read
      pull-requests: write
