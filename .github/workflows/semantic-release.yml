---
name: Release - Automated PR Creation
# Computes next semantic version using conventional commits and opens release PR.
# Prevents direct pushes to main by requiring PR workflow for all releases.
#
# Triggers:
#   push to main             — normal path for commits that do not touch the
#                              tools-image. Tool-path commits are skipped here
#                              so the workflow_run path below can run against
#                              a freshly-pushed digest instead of a stale one.
#   workflow_run (tools-image, success, main)
#                            — fires after a successful tools-image build,
#                              including weekly cron and manual dispatches.
#                              Digest-drift detection turns rebuilds into
#                              patch-bump releases so CVE fixes actually ship.
#   workflow_dispatch        — manual trigger for ad-hoc releases.
#
# A single concurrency group at the workflow level serialises all bump
# computations against main, so a push and a workflow_run firing close together
# do not race on `docker pull :latest`.

'on':
  push:
    branches: [main]
  workflow_run:
    workflows: ['Build - Tools Image']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: semantic-release-main
  cancel-in-progress: false

jobs:
  open-release-pr:
    permissions:
      contents: write
      pull-requests: write
    name: Compute next version and open Release PR
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    # Gate the whole job on the trigger. For workflow_run we require a
    # successful upstream build; otherwise a failed tools-image build would
    # race us with a stale digest. For push we defer the tool-path decision
    # to the "Skip on tool-path push" step below (which needs a checkout to
    # diff changed paths, so it cannot live in the job `if`).
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    defaults:
      run:
        shell: bash
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            docker.io:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            pypi.org:443
            files.pythonhosted.org:443
            static.rust-lang.org:443
            bun.sh:443
            astral.sh:443
            releases.astral.sh:443
            sh.rustup.rs:443
            registry.npmjs.org:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443
            semgrep.dev:443
            metrics.semgrep.dev:443
            api.osv.dev:443
            api.deps.dev:443
      - name: Create GitHub App installation token
        id: app-token
        # yamllint disable-line rule:line-length
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write

      # Checkout resolves the ref to use:
      #   - workflow_run events: head_sha of the triggering run (the commit
      #     whose tools-image build just finished) — otherwise the default
      #     branch at trigger-registration time, which lags real main.
      #   - push / workflow_dispatch: default (current main).
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: >-
            ${{ github.event_name == 'workflow_run'
              && github.event.workflow_run.head_sha
              || github.sha }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      # Skip push-triggered runs whose commit touched any tools-image input.
      # The tools-image workflow is running (or queued) for the same commit;
      # when it finishes it will fire workflow_run and that path will run the
      # release against a freshly-pushed digest. Running here would race and
      # ship a stale digest. Tool-path pushes therefore hand off entirely.
      - name: Skip on tool-path push
        id: tool_path
        if: github.event_name == 'push'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          paths=(
            "Dockerfile.tools"
            "scripts/utils/install-tools.sh"
            "package.json"
            "lintro/_tool_versions.py"
            "lintro/tools/manifest.json"
            ".github/workflows/tools-image.yml"
          )
          zero_sha="0000000000000000000000000000000000000000"
          if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" == "$zero_sha" ]]; then
            changed=$(git show --name-only --pretty=format: "$AFTER_SHA")
          else
            changed=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")
          fi
          should_skip=false
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            for pat in "${paths[@]}"; do
              if [[ "$file" == "$pat" ]]; then
                should_skip=true
                break 2
              fi
            done
            if [[ "$file" == scripts/ci/tools-image-*.sh ]]; then
              should_skip=true
              break
            fi
          done <<<"$changed"
          if [[ "$should_skip" == "true" ]]; then
            echo "Tool-path change detected — deferring to workflow_run trigger"
            echo "skip=true" >>"$GITHUB_OUTPUT"
          else
            echo "skip=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Environment setup
        if: steps.tool_path.outputs.skip != 'true'
        uses: ./.github/actions/setup-env
        with:
          python-version: '3.14'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Use python-semantic-release via uvx (tool isolation)
        if: steps.tool_path.outputs.skip != 'true'
        run: >
          echo "python-semantic-release will be invoked via uvx;
          not installed into project env"

      - name: Compute next version (semantic-release dry run)
        if: steps.tool_path.outputs.skip != 'true'
        id: semrel
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          MAX_BUMP: minor
        run: uv run python scripts/ci/maintenance/semantic_release_compute_next.py
      - name: Fail if no release tag baseline
        if: ${{ failure() && steps.tool_path.outputs.skip != 'true' }}
        run: scripts/ci/github/semantic-release-helpers.sh fail_no_tag_baseline

      - name: Read current version from pyproject.toml
        if: steps.tool_path.outputs.skip != 'true'
        id: current
        run: scripts/ci/github/semantic-release-helpers.sh read_current_version

      - name: Check if version bump needed
        if: steps.tool_path.outputs.skip != 'true'
        id: needs_bump
        env:
          NEXT_VERSION: ${{ steps.semrel.outputs.next_version }}
          CURRENT_VERSION: ${{ steps.current.outputs.current_version }}
        run: |
          if [[ -n "$NEXT_VERSION" && "$NEXT_VERSION" != "$CURRENT_VERSION" ]]; then
            echo "required=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if no new version
        if: >-
          steps.tool_path.outputs.skip != 'true' &&
          steps.needs_bump.outputs.required != 'true'
        run: >
          scripts/ci/github/semantic-release-helpers.sh skip_no_new_version
          "${{ steps.semrel.outputs.next_version }}"
          "${{ steps.current.outputs.current_version }}"

      - name: Update version files
        if: steps.needs_bump.outputs.required == 'true'
        run: >
          scripts/ci/github/semantic-release-helpers.sh update_version_files
          "${{ steps.semrel.outputs.next_version }}"

      - name: Update tools image digest
        if: steps.needs_bump.outputs.required == 'true'
        run: scripts/ci/github/semantic-release-helpers.sh update_tools_digest

      - name: Install external tools for Lintro (formatting)
        if: steps.needs_bump.outputs.required == 'true'
        run: scripts/ci/github/semantic-release-helpers.sh install_external_tools

      - name: Run Lintro format
        if: steps.needs_bump.outputs.required == 'true'
        run: uv run lintro format .

      - name: Run Lintro check
        if: steps.needs_bump.outputs.required == 'true'
        run: uv run lintro check . --output-format grid

      - name: Create Release PR
        if: steps.needs_bump.outputs.required == 'true'
        id: cpr
        # yamllint disable-line rule:line-length
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: 'chore(release): cut ${{ steps.semrel.outputs.next_version }}'
          title: 'chore(release): prepare ${{ steps.semrel.outputs.next_version }}'
          body: |
            Automated version bump to `${{ steps.semrel.outputs.next_version }}`.

            - Updates `pyproject.toml` and `lintro/__init__.py`
            - Updates tools image digest in pinned files
            - Respects branch protection (no direct push to `main`)
            - Upon merge, tag and publish workflows will run automatically

            Bump reason:
            ${{ steps.semrel.outputs.bump_reason || 'conventional-commits' }}
          branch: release/${{ steps.semrel.outputs.next_version }}
          base: main
          labels: |
            release-bump
          # yamllint enable

      - name: Enable auto-merge for Release PR
        if: ${{ steps.cpr.outputs.pull-request-number != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          scripts/ci/github/semantic-release-helpers.sh merge_release_pr
          "${{ steps.cpr.outputs.pull-request-number }}"
