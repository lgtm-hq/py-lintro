---
name: CI - Docker

# Docker build once → dogfooding quality (reusable-quality-lint + CI image) →
# integration tests → security audit → publish (main).
# manifest-sync runs in parallel (no Docker).

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions: {}

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CACHE_OPTS: mode=max,compression=zstd,oci-mediatypes=true,image-manifest=true

jobs:
  manifest-sync:
    name: 📋 Manifest Sync
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            astral.sh:443
            releases.astral.sh:443
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Environment setup
        uses: ./.github/actions/setup-env
        with:
          python-version: '3.14'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOOTSTRAP_SKIP_INSTALL_TOOLS: '1'
      - name: Verify generated tool versions
        run: python3 scripts/ci/generate-tool-versions.py --check

  docker-build:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-24.04
    permissions:
      contents: read # checkout and build context
      packages: write # push CI-tagged images to GHCR
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    concurrency:
      group: docker-build-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      is-fork: ${{ steps.fork-check.outputs.is-fork }}
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            docker.io:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            pypi.org:443
            files.pythonhosted.org:443
            static.rust-lang.org:443
            bun.sh:443
            astral.sh:443
            releases.astral.sh:443
            sh.rustup.rs:443
            deb.debian.org:80
            registry.npmjs.org:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443
            semgrep.dev:443
            metrics.semgrep.dev:443
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check if fork PR
        id: fork-check
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_FORK_PR: ${{ github.event.pull_request.head.repo.fork }}
        run: scripts/ci/detect-fork-pr.sh
      - name: Free disk space (fork fallback)
        if: steps.fork-check.outputs.is-fork == 'true'
        run: scripts/ci/free-disk-space.sh
      - name: Set up Docker Buildx (fork)
        if: steps.fork-check.outputs.is-fork == 'true'
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver: docker
      - name: Set up Docker Buildx
        if: steps.fork-check.outputs.is-fork != 'true'
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GitHub Container Registry
        if: steps.fork-check.outputs.is-fork != 'true'
        # yamllint disable-line rule:line-length
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image (fork)
        if: steps.fork-check.outputs.is-fork == 'true'
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: full
          push: false
          load: true
          tags: py-lintro:latest
          cache-from: type=gha
          provenance: false
      - name: Build and push Docker image (GHCR CI tag)
        if: steps.fork-check.outputs.is-fork != 'true'
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: full
          push: true
          tags: ghcr.io/lgtm-hq/py-lintro:ci-${{ github.run_id }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/lgtm-hq/py-lintro:cache
          cache-to: >-
            type=registry,ref=ghcr.io/lgtm-hq/py-lintro:cache,${{ env.CACHE_OPTS }}
          provenance: false
      - name: Build Base Docker image (fork)
        if: steps.fork-check.outputs.is-fork == 'true'
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: base
          push: false
          load: true
          tags: py-lintro:base
          cache-from: type=gha
          provenance: false
      - name: Build and push Base Docker image (GHCR CI tag)
        if: steps.fork-check.outputs.is-fork != 'true'
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: base
          push: true
          tags: ghcr.io/lgtm-hq/py-lintro-base:ci-${{ github.run_id }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/lgtm-hq/py-lintro-base:cache
          cache-to: >-
            type=registry,ref=ghcr.io/lgtm-hq/py-lintro-base:cache,${{ env.CACHE_OPTS }}
          provenance: false
      - name: Save Docker images to tarball (fork fallback)
        if: steps.fork-check.outputs.is-fork == 'true'
        run: scripts/docker/save-ci-images-tarball.sh
      - name: Upload Docker images artifact (fork fallback)
        if: steps.fork-check.outputs.is-fork == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: docker-images
          path: /tmp/py-lintro-images.tar
          retention-days: 1

  dogfooding-lint:
    needs: [docker-build, manifest-sync]
    # Run when docker-build succeeds even if manifest-sync was skipped (draft PRs).
    if: >-
      always() &&
      !cancelled() &&
      needs.docker-build.result == 'success' &&
      (
        needs.manifest-sync.result == 'success' ||
        needs.manifest-sync.result == 'skipped'
      )
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-quality-lint.yml@1014e3d7d5441a63215d2096545a46cff6de101c # v0.48.0
    permissions:
      contents: read
      packages: read # pull lintro-image from GHCR in reusable-quality-lint
    with:
      tooling-ref: '1014e3d7d5441a63215d2096545a46cff6de101c' # v0.48.0
      job-name: '🛠️ Dogfooding Lint'
      lintro-tool-options: >-
        pydoclint:timeout=120,osv_scanner:check_suppressions=false
      egress-policy: block
      # Same-repo PRs: lint with the image built in this workflow run.
      # Fork PRs: CI images are not pushed to GHCR (artifact tarball only), so
      # fall back to the pinned release image — integration tests still use the
      # fork-built image via the tarball path.
      # Pinned digest — keep in sync with pyproject.toml lintro pin
      lintro-image: >-
        ${{ needs.docker-build.outputs.is-fork == 'true'
        && format(
          'ghcr.io/lgtm-hq/py-lintro@sha256:{0}',
          '1ff3db35939283734b859c7c5d95be87fd8fd62734b3434e0437769d50d53578'
        )
        || format('ghcr.io/lgtm-hq/py-lintro:ci-{0}', github.run_id) }}

  dogfooding-pr-comment:
    needs: dogfooding-lint
    if: >-
      always() &&
      !cancelled() &&
      needs.dogfooding-lint.result != 'cancelled' &&
      needs.dogfooding-lint.result != 'skipped' &&
      needs.dogfooding-lint.outputs.exit-code != '' &&
      needs.dogfooding-lint.outputs.status != '' &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.fork == false &&
      github.event.pull_request.draft == false
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-quality-summary.yml@1014e3d7d5441a63215d2096545a46cff6de101c # v0.48.0
    permissions:
      contents: read
      pull-requests: write # post lintro results as PR comment
    with:
      exit-code: ${{ needs.dogfooding-lint.outputs.exit-code }}
      tooling-ref: '1014e3d7d5441a63215d2096545a46cff6de101c' # v0.48.0
      job-name: '🛠️ Dogfooding Lint PR Comment'
      egress-policy: block

  # Org ruleset (checks-py-lintro): lintro-code-quality / 🛠️ Lintro Code Quality
  lintro-code-quality:
    needs: [docker-build, manifest-sync, dogfooding-lint]
    if: >-
      always() &&
      !cancelled() &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      )
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-required-check.yml@1014e3d7d5441a63215d2096545a46cff6de101c # v0.48.0
    permissions:
      contents: read
    with:
      tooling-ref: '1014e3d7d5441a63215d2096545a46cff6de101c' # v0.48.0
      job-name: '🛠️ Lintro Code Quality'
      runner-image: ubuntu-24.04
      upstream-result: >-
        ${{
          needs.docker-build.result != 'success' && needs.docker-build.result
          || (
            needs.manifest-sync.result != 'success' &&
            needs.manifest-sync.result != 'skipped'
          ) && needs.manifest-sync.result
          || needs.dogfooding-lint.result
        }}
      status-output: ${{ needs.dogfooding-lint.outputs.status }}
      status-expected: passed
      egress-policy: block
      egress-preset: github-tooling

  security-audit:
    name: 🔐 Security Audit
    needs: [docker-build]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read # GHCR login and CI image pull steps below
      pull-requests: write # post-pr-comment step for security audit results
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            api.osv.dev:443
            api.deps.dev:443
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Log in to GHCR
        if: needs.docker-build.outputs.is-fork != 'true'
        # yamllint disable-line rule:line-length
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull CI image from GHCR
        if: needs.docker-build.outputs.is-fork != 'true'
        env:
          CI_TAG: ci-${{ github.run_id }}
        run: scripts/ci/testing/pull-ci-docker-images.sh full
      - name: Download Docker images artifact (fork fallback)
        if: needs.docker-build.outputs.is-fork == 'true'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: docker-images
          path: /tmp
      - name: Load Docker images (fork fallback)
        if: needs.docker-build.outputs.is-fork == 'true'
        run: scripts/ci/testing/load-ci-docker-images.sh
      - name: Run security audit
        id: audit
        continue-on-error: true
        run: scripts/ci/security-comment.sh
      - name: Comment PR with security audit results
        if: github.event_name == 'pull_request'
        continue-on-error: true
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/post-pr-comment@1014e3d7d5441a63215d2096545a46cff6de101c # v0.48.0
        with:
          file: security-audit-comment.txt
          marker: security-audit-report
          mode: upsert
      - name: Fail on vulnerabilities
        if: steps.audit.outcome == 'failure'
        run: scripts/ci/fail-on-security-audit.sh

  integration-test:
    name: 🧪 Docker Integration Tests
    needs: [docker-build]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read # GHCR login and CI image pull steps below
    timeout-minutes: 45
    env:
      LINTRO_OUTPUT_DIR: /tmp/lintro
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            docker.io:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            pypi.org:443
            files.pythonhosted.org:443
            static.rust-lang.org:443
            bun.sh:443
            astral.sh:443
            releases.astral.sh:443
            sh.rustup.rs:443
            deb.debian.org:80
            registry.npmjs.org:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443
            semgrep.dev:443
            metrics.semgrep.dev:443
            api.osv.dev:443
            api.deps.dev:443
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Log in to GHCR
        if: needs.docker-build.outputs.is-fork != 'true'
        # yamllint disable-line rule:line-length
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull CI images from GHCR
        if: needs.docker-build.outputs.is-fork != 'true'
        env:
          CI_TAG: ci-${{ github.run_id }}
        run: scripts/ci/testing/pull-ci-docker-images.sh both
      - name: Download Docker images artifact (fork fallback)
        if: needs.docker-build.outputs.is-fork == 'true'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: docker-images
          path: /tmp
      - name: Load Docker images (fork fallback)
        if: needs.docker-build.outputs.is-fork == 'true'
        run: scripts/ci/testing/load-ci-docker-images.sh
      - name: Smoke Test Docker Image
        run: ./scripts/docker/docker-build-test.sh
      - name: Smoke Test Base Image
        run: scripts/docker/smoke-test-base-image.sh
      - name: Run Docker integration tests
        run: scripts/docker/run-docker-test-suite.sh
      - name: Extract test summary
        if: always()
        run: >-
          scripts/ci/testing/extract-test-summary.sh
          test-output.log test-summary.json || true
      - name: Upload test summary artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: test-summary
          path: test-summary.json
          retention-days: 30
          if-no-files-found: warn

  publish:
    name: 📦 Publish to GHCR
    needs: [dogfooding-lint, security-audit, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: read # checkout and metadata extraction
      packages: write # push release images to GHCR
    timeout-minutes: 30
    concurrency:
      group: publish-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            docker.io:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            production.cloudfront.docker.com:443
            deb.debian.org:80
            pypi.org:443
            files.pythonhosted.org:443
            static.rust-lang.org:443
            bun.sh:443
            astral.sh:443
            releases.astral.sh:443
            sh.rustup.rs:443
            registry.npmjs.org:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443
            semgrep.dev:443
            metrics.semgrep.dev:443
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false
      - name: Setup Docker (Buildx + login)
        uses: ./.github/actions/setup-docker
        with:
          login: 'true'
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          driver: docker-container
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/lgtm-hq/py-lintro
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Extract metadata (base)
        id: meta-base
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/lgtm-hq/py-lintro-base
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: full
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/lgtm-hq/py-lintro:cache
          cache-to: >-
            type=registry,ref=ghcr.io/lgtm-hq/py-lintro:cache,${{ env.CACHE_OPTS }}
          provenance: false
          sbom: false
      - name: Build and push Base Docker image
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          target: base
          push: true
          tags: ${{ steps.meta-base.outputs.tags }}
          labels: ${{ steps.meta-base.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/lgtm-hq/py-lintro-base:cache
          cache-to: >-
            type=registry,ref=ghcr.io/lgtm-hq/py-lintro-base:cache,${{ env.CACHE_OPTS }}
          provenance: false
          sbom: false

  cleanup-ci-images:
    name: 🧹 Cleanup CI Images
    needs: [docker-build, dogfooding-lint, security-audit, integration-test, publish]
    if: >-
      always() &&
      needs.docker-build.outputs.is-fork != 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read # checkout delete-ci-ghcr-tags.sh
      packages: write # delete ephemeral CI tags from GHCR
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Delete CI-tagged images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_TAG: ci-${{ github.run_id }}
        run: scripts/ci/maintenance/delete-ci-ghcr-tags.sh
