---
name: Release - Version PR

'on':
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-version-pr-${{ github.repository }}
  cancel-in-progress: false

jobs:
  version-pr:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-version-pr.yml@a8b6e50f095c8eb1a49d60f4df71a552c460b211 # v0.45.1
    with:
      ecosystems: python
      auto-merge: true
      max-bump: minor
      tooling-ref: 'a8b6e50f095c8eb1a49d60f4df71a552c460b211' # v0.45.1
      egress-policy: block
      egress-preset: pypi
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    permissions:
      contents: write
      pull-requests: write
