---
name: Release - Version PR

'on':
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-version-pr-${{ github.repository }}
  cancel-in-progress: false

jobs:
  version-pr:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-version-pr.yml@deb53fdb15a630cc60e6e5f35ecb9a8b58966690 # v0.45.2
    with:
      ecosystems: python
      auto-merge: true
      max-bump: minor
      tooling-ref: 'deb53fdb15a630cc60e6e5f35ecb9a8b58966690' # v0.45.2
      egress-policy: block
      egress-preset: pypi
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    permissions:
      contents: write
      pull-requests: write
