---
name: Build - Tools Image
# Builds and publishes the pre-built tools image used by the main Dockerfile.
# Runs weekly to pick up base image security updates and on changes to tool configs.
# Can be called as a reusable workflow by other workflows.

# Triggers:
# yamllint disable rule:line-length
#   push to main (path-filtered) — primary production build; digest pin is applied
#                                 in the semantic-release PR (see semantic-release.yml,
#                                 triggered by workflow_run on this workflow's success).
#   schedule (weekly)           — picks up base-image security updates; semantic-release
#                                 detects the new :latest digest via drift check and
#                                 opens a patch-bump release PR so the rebuild ships.
#   workflow_dispatch           — manual rebuild; pass force_latest=true to retag :latest
#   workflow_call               — called by ci-pipeline.yml for PRs with tool file changes;
#                                 pull_request trigger removed — ci-pipeline.yml owns that path
# yamllint enable rule:line-length
'on':
  schedule:
    # Weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  push:
    branches: [main]
    paths:
      - Dockerfile.tools
      - scripts/utils/install-tools.sh
      - scripts/ci/tools-image-*.sh
      - package.json
      - lintro/_tool_versions.py
      - lintro/tools/manifest.json
      - .github/workflows/tools-image.yml
  workflow_dispatch:
    inputs:
      force_latest:
        description: 'Force push to :latest tag (use with caution)'
        required: false
        default: 'false'

  # Reusable workflow support — called by ci-pipeline.yml when a PR changes tool files.
  # pr_number must be passed so tags.sh generates the expected pr-N tag.
  # No workflow_call outputs: ci-pipeline.yml derives the built image tag from
  # CALL_RESULT + PR_NUMBER directly, avoiding the workflow_call output reference
  # restriction that triggers startup_failure when the providing job is conditional.
  workflow_call:
    inputs:
      skip_if_unchanged:
        description: 'Skip build if tool files unchanged (for workflow_call)'
        type: boolean
        default: true
      pr_number:
        description: 'PR number when called from a pull_request context'
        type: string
        default: ''

permissions: {}

jobs:
  # Detect if tool files changed (for workflow_call only, path filters don't apply)
  check-changes:
    name: Check Tool Changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      tools-changed: ${{ steps.filter.outputs.tools || 'false' }}
      is-workflow-call: ${{ steps.check-event.outputs.is-workflow-call }}
    steps:
      - name: Check event type
        id: check-event
        run: |
          if [[ "${{ github.event_name }}" == "workflow_call" ]]; then
            echo "is-workflow-call=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-workflow-call=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Harden Runner
        if: github.event_name == 'workflow_call'
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443

      - name: Checkout
        if: github.event_name == 'workflow_call'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check for tool file changes
        if: github.event_name == 'workflow_call'
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            tools:
              - Dockerfile.tools
              - scripts/utils/install-tools.sh
              - scripts/ci/tools-image-*.sh
              - package.json
              - lintro/_tool_versions.py
              - lintro/tools/manifest.json
              - .github/workflows/tools-image.yml

  build-tools-image:
    name: Build Tools Image
    runs-on: ubuntu-24.04
    needs: [check-changes]
    # Run if: check-changes succeeded AND event is allowed AND build is needed.
    # workflow_dispatch is restricted to main (non-main dispatches skip the build
    # since pin-digest won't run anyway and we want to avoid stray image tags).
    # yamllint disable rule:line-length
    if: >-
      needs.check-changes.result == 'success' &&
      (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main') &&
      ((needs.check-changes.outputs.is-workflow-call != 'true') ||
      (needs.check-changes.outputs.tools-changed == 'true') ||
      (inputs.skip_if_unchanged == false))
    # yamllint enable rule:line-length
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    concurrency:
      group: tools-image-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      primary-tag: ${{ steps.tags.outputs.primary_tag }}
      digest: ${{ steps.digest.outputs.digest }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            docker.io:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            pypi.org:443
            files.pythonhosted.org:443
            static.rust-lang.org:443
            bun.sh:443
            astral.sh:443
            releases.astral.sh:443
            sh.rustup.rs:443
            deb.debian.org:80
            registry.npmjs.org:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443
            semgrep.dev:443
            metrics.semgrep.dev:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check if fork PR
        id: fork-check
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_FORK_PR: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          IS_FORK="false"
          if [[ "$EVENT_NAME" == "workflow_call" && "$IS_FORK_PR" == "true" ]]; then
            IS_FORK="true"
          fi
          echo "is-fork=${IS_FORK}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        if: steps.fork-check.outputs.is-fork != 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: tags
        env:
          EVENT_NAME: ${{ github.event_name }}
          GIT_REF: ${{ github.ref }}
          FORCE_LATEST: ${{ inputs.force_latest }}
          # For workflow_call triggered by a PR, the PR number is passed as an
          # input so tags.sh generates the pr-N tag (github.event.pull_request.number
          # is empty under workflow_call events).
          PR_NUMBER: ${{ inputs.pr_number }}
        run: scripts/ci/tools-image-tags.sh

      - name: Build tools image
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        env:
          # PRs scope to pr-<N>; everything else (push/main, schedule,
          # workflow_dispatch) reads/writes :main. workflow_call inherits the
          # caller's event context, so pull_request still resolves correctly.
          CACHE_TAG: >-
            ${{ inputs.pr_number != ''
                && format('pr-{0}', inputs.pr_number)
                || 'main' }}
          REPO: ghcr.io/lgtm-hq/lintro-tools-buildcache
          # yamllint disable-line rule:line-length
          CACHE_OPTS: mode=max,compression=zstd,oci-mediatypes=true,image-manifest=true
        with:
          context: .
          file: Dockerfile.tools
          push: false
          load: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: |
            type=registry,ref=${{ env.REPO }}:${{ env.CACHE_TAG }}
            type=registry,ref=${{ env.REPO }}:main
          cache-to: >-
            ${{ steps.fork-check.outputs.is-fork != 'true' &&
                format('type=registry,ref={0}:{1},{2}',
                       env.REPO, env.CACHE_TAG, env.CACHE_OPTS)
                || '' }}

      - name: Verify tools installation
        env:
          IMAGE: ${{ steps.tags.outputs.primary_tag }}
        run: scripts/ci/tools-image-verify.sh

      - name: Push tools image
        if: steps.fork-check.outputs.is-fork != 'true'
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
        run: scripts/ci/tools-image-push.sh

      - name: Save tools image to tarball
        if: steps.fork-check.outputs.is-fork == 'true'
        env:
          IMAGE_TAG: ${{ steps.tags.outputs.primary_tag }}
        run: docker save "$IMAGE_TAG" -o /tmp/tools-image.tar

      - name: Upload tools image artifact
        if: steps.fork-check.outputs.is-fork == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: tools-image
          path: /tmp/tools-image.tar
          retention-days: 1

      - name: Resolve image digest
        id: digest
        if: steps.fork-check.outputs.is-fork != 'true'
        env:
          IMAGE_TAG: ${{ steps.tags.outputs.primary_tag }}
        run: scripts/ci/tools-image-resolve-digest.sh

      - name: Attest tools image provenance
        # yamllint disable-line rule:line-length
        if: steps.fork-check.outputs.is-fork != 'true'
        # actions/attest-build-provenance v3.1.0
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275
        with:
          subject-name: ${{ steps.digest.outputs.image_name }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

      - name: Summary
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
          PUSH_LATEST: ${{ steps.tags.outputs.push_latest }}
          PR_TAG: ${{ steps.tags.outputs.pr_tag }}
        run: scripts/ci/tools-image-summary.sh
