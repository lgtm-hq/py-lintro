---
name: Security - SBOM Generation

'on':
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: sbom-main-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  sbom:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@ee8484ca71db3a2c2c33da6128bbf2330fcd7c88 # v0.59.2
    with:
      target: .
      target-type: dir
      sbom-format: cyclonedx-json
      scan-vulnerabilities: true
      create-attestation: true
      tooling-ref: 'ee8484ca71db3a2c2c33da6128bbf2330fcd7c88'  # v0.59.2
      egress-policy: block
      egress-preset: sbom
    permissions:
      # write: reusable-sbom v0.52.3 requests contents: write (release SBOM
      # asset upload); a lower caller grant is a parse-time startup_failure
      contents: write
      security-events: write
      id-token: write
      attestations: write
