---
name: Security - SBOM Generation

'on':
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: sbom-main-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  sbom:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@d9b302c919efc84fc001e9f3ef63bc9061d04b8f
    with:
      target: .
      target-type: dir
      sbom-format: cyclonedx-json
      scan-vulnerabilities: true
      create-attestation: true
      tooling-ref: 'd9b302c919efc84fc001e9f3ef63bc9061d04b8f'
    permissions:
      contents: read
      security-events: write
      id-token: write
      attestations: write
