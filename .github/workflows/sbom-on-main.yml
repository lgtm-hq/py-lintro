---
name: Security - SBOM Generation

'on':
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: sbom-main-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  sbom:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@3d3e577c8e50e11ead6bd36cb559361d33796a9d # v0.47.1
    with:
      target: .
      target-type: dir
      sbom-format: cyclonedx-json
      scan-vulnerabilities: true
      create-attestation: true
      tooling-ref: '4aaefe64763b7841b6d92d94dc47185083d34c9a' # v0.46.0
      egress-policy: block
      egress-preset: sbom
    permissions:
      contents: read
      security-events: write
      id-token: write
      attestations: write
