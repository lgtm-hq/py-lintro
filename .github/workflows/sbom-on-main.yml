---
name: Security - SBOM Generation

'on':
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: sbom-main-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  sbom:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@4c36e28118ecf4f63df55e4a68b850d5e2697975
    with:
      target: .
      target-type: dir
      sbom-format: cyclonedx-json
      scan-vulnerabilities: true
      create-attestation: true
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        release-assets.githubusercontent.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        anchore.io:443
        get.anchore.io:443
        toolbox-data.anchore.io:443
        grype.anchore.io:443
        pipelines.actions.githubusercontent.com:443
        fulcio.sigstore.dev:443
        rekor.sigstore.dev:443
        timestamp.sigstore.dev:443
        tuf-repo-cdn.sigstore.dev:443
        sigstore-tuf-root.storage.googleapis.com:443
      tooling-ref: '4c36e28118ecf4f63df55e4a68b850d5e2697975'
    permissions:
      contents: read
      security-events: write
      id-token: write
      attestations: write
