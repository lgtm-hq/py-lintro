---
name: Security - SBOM Generation

'on':
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: sbom-main-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  sbom:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@9416eb2bf71539bcc355e1dcf463a533a0924d74 # v0.55.0
    with:
      target: .
      target-type: dir
      sbom-format: cyclonedx-json
      scan-vulnerabilities: true
      create-attestation: true
      tooling-ref: '9416eb2bf71539bcc355e1dcf463a533a0924d74' # v0.55.0
      egress-policy: block
      egress-preset: sbom
    permissions:
      # write: reusable-sbom v0.52.3 requests contents: write (release SBOM
      # asset upload); a lower caller grant is a parse-time startup_failure
      contents: write
      security-events: write
      id-token: write
      attestations: write
