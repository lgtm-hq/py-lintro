---
name: Quality Check - PR Title Validation

'on':
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-title:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@78a5255d51dc2e1e061e4103a95f3ca0c646275d # v0.32.1
    with:
      tooling-ref: '78a5255d51dc2e1e061e4103a95f3ca0c646275d' # v0.32.1
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      # lgtm-ci reusable-semantic-pr-title → amannn/action-semantic-pull-request:
      # read PR title/metadata only (read-only; satisfies least-privilege audits).
      pull-requests: read
