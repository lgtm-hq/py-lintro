---
name: Quality Check - PR Title Validation

'on':
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-title:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@deb53fdb15a630cc60e6e5f35ecb9a8b58966690 # v0.45.2
    with:
      tooling-ref: 'deb53fdb15a630cc60e6e5f35ecb9a8b58966690' # v0.45.2
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      # post-failure-comment (default: true) upserts failure comments on the PR
      pull-requests: write
