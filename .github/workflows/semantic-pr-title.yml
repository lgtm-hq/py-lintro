---
name: Quality Check - PR Title Validation

'on':
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-title:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@3d3e577c8e50e11ead6bd36cb559361d33796a9d # v0.47.1
    with:
      tooling-ref: '4aaefe64763b7841b6d92d94dc47185083d34c9a' # v0.46.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      # post-failure-comment (default: true) upserts failure comments on the PR
      pull-requests: write
