---
name: Quality Check - PR Title Validation

'on':
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-title:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@dfd52172e5ee817cb1b1baf24895209c5e18d5ad # v0.19.0
    with:
      # action-semantic-pull-request expects newline-delimited types, not CSV
      types: |
        feat
        fix
        docs
        style
        refactor
        perf
        test
        build
        ci
        chore
        revert
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
    permissions:
      contents: read
      # lgtm-ci reusable-semantic-pr-title → amannn/action-semantic-pull-request:
      # read PR title/metadata only (read-only; satisfies least-privilege audits).
      pull-requests: read
