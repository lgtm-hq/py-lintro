---
name: Quality Check - PR Title Validation

'on':
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-title:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
    with:
      # Org ruleset (checks-py-lintro): semantic-title / 📝 Validate PR Title
      job-name: '📝 Validate PR Title'
      tooling-ref: '31c25ef2e8992960e218524780e34f44f51271b5' # v0.54.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      # post-failure-comment (default: true) upserts failure comments on the PR
      pull-requests: write
