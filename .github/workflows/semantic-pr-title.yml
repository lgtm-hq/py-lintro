---
name: Quality Check - PR Title Validation

'on':
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-title:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@ca8f9a6c00b561e9457104d4e67be11cb30eb5b1 # v0.24.0
    with:
      tooling-ref: 'ca8f9a6c00b561e9457104d4e67be11cb30eb5b1' # v0.24.0
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
    permissions:
      contents: read
      # lgtm-ci reusable-semantic-pr-title → amannn/action-semantic-pull-request:
      # read PR title/metadata only (read-only; satisfies least-privilege audits).
      pull-requests: read
