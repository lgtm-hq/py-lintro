---
name: Quality Check - PR Title Validation

'on':
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-title:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@a8b6e50f095c8eb1a49d60f4df71a552c460b211 # v0.45.1
    with:
      tooling-ref: 'a8b6e50f095c8eb1a49d60f4df71a552c460b211' # v0.45.1
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      # lgtm-ci reusable-semantic-pr-title → amannn/action-semantic-pull-request:
      # read PR title/metadata only (read-only; satisfies least-privilege audits).
      pull-requests: read
