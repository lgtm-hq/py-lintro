---
name: Quality Check - PR Title Validation

'on':
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-title:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@1014e3d7d5441a63215d2096545a46cff6de101c # v0.48.0
    with:
      tooling-ref: '1014e3d7d5441a63215d2096545a46cff6de101c' # v0.48.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      # post-failure-comment (default: true) upserts failure comments on the PR
      pull-requests: write
