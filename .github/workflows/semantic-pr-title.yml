---
name: Quality Check - PR Title Validation

'on':
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  merge_group:

permissions: {}

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  semantic-title:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-semantic-pr-title.yml@fe0b8d135c36a8c636b65c3e34f174839313712e
    with:
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
      tooling-ref: 'fe0b8d135c36a8c636b65c3e34f174839313712e'
    permissions:
      contents: read
