---
name: Build - Docker Image & Registry
# Builds and publishes Docker images to GHCR via lgtm-ci reusable-docker.
# Called by publish-pypi-on-tag.yml for release tag pushes.

'on':
  workflow_call:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Run publish on this branch (manual testing)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  docker-full:
    name: 🐳 Docker Full Image
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-docker.yml@32022b3d920ec123790873ab194638e5db2bcd86 # v0.29.1
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      file: Dockerfile
      target: full
      image-name: lgtm-hq/py-lintro
      version: >-
        ${{ startsWith(github.ref, 'refs/tags/')
        && github.ref_name
        || (github.event_name == 'release' && github.event.release.tag_name || '') }}
      push: >-
        ${{ github.event_name != 'pull_request'
        && (github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/tags/')
        || github.event_name == 'release'
        || (github.event_name == 'workflow_dispatch'
        && inputs.force_publish == 'true')) }}
      platforms: linux/amd64,linux/arm64
      runner-map: '{"linux/arm64":"ubuntu-24.04-arm"}'
      smoke-test: lintro --version
      validate-on-pr: false
      cache-registry-ref: ghcr.io/lgtm-hq/py-lintro:cache
      no-cache: ${{ startsWith(github.ref, 'refs/tags/') }}
      provenance: false
      sbom: false
      tooling-ref: '32022b3d920ec123790873ab194638e5db2bcd86' # v0.29.1
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        release-assets.githubusercontent.com:443
        objects.githubusercontent.com:443
        ghcr.io:443
        pkg-containers.githubusercontent.com:443
        docker.io:443
        registry-1.docker.io:443
        auth.docker.io:443
        production.cloudflare.docker.com:443
        production.cloudfront.docker.com:443
        pypi.org:443
        files.pythonhosted.org:443
        static.rust-lang.org:443
        bun.sh:443
        astral.sh:443
        releases.astral.sh:443
        sh.rustup.rs:443
        deb.debian.org:80
        registry.npmjs.org:443
        crates.io:443
        static.crates.io:443
        index.crates.io:443
        semgrep.dev:443
        metrics.semgrep.dev:443

  docker-base:
    name: 🐳 Docker Base Image
    needs: docker-full
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-docker.yml@32022b3d920ec123790873ab194638e5db2bcd86 # v0.29.1
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      file: Dockerfile
      target: base
      image-name: lgtm-hq/py-lintro-base
      version: >-
        ${{ startsWith(github.ref, 'refs/tags/')
        && github.ref_name
        || (github.event_name == 'release' && github.event.release.tag_name || '') }}
      push: >-
        ${{ github.event_name != 'pull_request'
        && (github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/tags/')
        || github.event_name == 'release'
        || (github.event_name == 'workflow_dispatch'
        && inputs.force_publish == 'true')) }}
      platforms: linux/amd64,linux/arm64
      runner-map: '{"linux/arm64":"ubuntu-24.04-arm"}'
      smoke-test: lintro --version
      validate-on-pr: false
      cache-registry-ref: ghcr.io/lgtm-hq/py-lintro-base:cache
      no-cache: ${{ startsWith(github.ref, 'refs/tags/') }}
      provenance: false
      sbom: false
      tooling-ref: '32022b3d920ec123790873ab194638e5db2bcd86' # v0.29.1
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        release-assets.githubusercontent.com:443
        objects.githubusercontent.com:443
        ghcr.io:443
        pkg-containers.githubusercontent.com:443
        docker.io:443
        registry-1.docker.io:443
        auth.docker.io:443
        production.cloudflare.docker.com:443
        production.cloudfront.docker.com:443
        pypi.org:443
        files.pythonhosted.org:443
        static.rust-lang.org:443
        bun.sh:443
        astral.sh:443
        releases.astral.sh:443
        sh.rustup.rs:443
        deb.debian.org:80
        registry.npmjs.org:443
        crates.io:443
        static.crates.io:443
        index.crates.io:443
        semgrep.dev:443
        metrics.semgrep.dev:443
