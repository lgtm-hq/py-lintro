---
name: Build - Docker Image & Registry
# Builds and publishes Docker images to GHCR via lgtm-ci reusable-docker.
# Called by publish-pypi-on-tag.yml for release tag pushes.

'on':
  workflow_call:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Run publish on this branch (manual testing)'
        required: false
        default: 'false'
      backfill_version:
        description: >-
          Backfill: version to (re)publish, e.g. 0.65.0.
          Leave empty for normal builds. When set, builds from backfill_ref,
          tags that version, and does NOT move the latest tag.
        required: false
        default: ''
      backfill_ref:
        description: 'Backfill: git ref to build that version from, e.g. v0.65.0.'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  docker-full:
    name: 🐳 Docker Full Image
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-docker.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      file: Dockerfile
      target: full
      image-name: lgtm-hq/py-lintro
      version: >-
        ${{ (github.event_name == 'workflow_dispatch'
        && inputs.backfill_version != '') && inputs.backfill_version
        || (startsWith(github.ref, 'refs/tags/')
        && github.ref_name
        || (github.event_name == 'release' && github.event.release.tag_name || '')) }}
      push: >-
        ${{ github.event_name != 'pull_request'
        && (github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/tags/')
        || github.event_name == 'release'
        || (github.event_name == 'workflow_dispatch'
        && (inputs.force_publish == 'true' || inputs.backfill_version != ''))) }}
      source-ref: >-
        ${{ github.event_name == 'workflow_dispatch'
        && inputs.backfill_ref || '' }}
      tag-latest: >-
        ${{ !(github.event_name == 'workflow_dispatch'
        && inputs.backfill_version != '') }}
      platforms: linux/amd64,linux/arm64
      runner-map: '{"linux/arm64":"ubuntu-24.04-arm"}'
      smoke-test: lintro --version
      validate-on-pr: false
      cache-registry-ref: ghcr.io/lgtm-hq/py-lintro:cache
      no-cache: >-
        ${{ startsWith(github.ref, 'refs/tags/')
        || (github.event_name == 'workflow_dispatch'
        && inputs.backfill_version != '') }}
      provenance: false
      sbom: false
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: docker
      # Full list (v0.50.0+ replace semantics): the reusable passes
      # allowed-endpoints verbatim to step-security/harden-runner, so a
      # non-empty value must include the docker preset baseline.
      allowed-endpoints-mode: replace
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        github-releases.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
        ghcr.io:443
        pkg-containers.githubusercontent.com:443
        docker.io:443
        registry-1.docker.io:443
        auth.docker.io:443
        production.cloudflare.docker.com:443
        production.cloudfront.docker.com:443
        deb.debian.org:80
        pypi.org:443
        files.pythonhosted.org:443
        static.rust-lang.org:443
        bun.sh:443
        astral.sh:443
        releases.astral.sh:443
        sh.rustup.rs:443
        registry.npmjs.org:443
        crates.io:443
        static.crates.io:443
        index.crates.io:443
        semgrep.dev:443
        metrics.semgrep.dev:443

  docker-base:
    name: 🐳 Docker Base Image
    needs: docker-full
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-docker.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      file: Dockerfile
      target: base
      image-name: lgtm-hq/py-lintro-base
      version: >-
        ${{ (github.event_name == 'workflow_dispatch'
        && inputs.backfill_version != '') && inputs.backfill_version
        || (startsWith(github.ref, 'refs/tags/')
        && github.ref_name
        || (github.event_name == 'release' && github.event.release.tag_name || '')) }}
      push: >-
        ${{ github.event_name != 'pull_request'
        && (github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/tags/')
        || github.event_name == 'release'
        || (github.event_name == 'workflow_dispatch'
        && (inputs.force_publish == 'true' || inputs.backfill_version != ''))) }}
      source-ref: >-
        ${{ github.event_name == 'workflow_dispatch'
        && inputs.backfill_ref || '' }}
      tag-latest: >-
        ${{ !(github.event_name == 'workflow_dispatch'
        && inputs.backfill_version != '') }}
      platforms: linux/amd64,linux/arm64
      runner-map: '{"linux/arm64":"ubuntu-24.04-arm"}'
      smoke-test: lintro --version
      validate-on-pr: false
      cache-registry-ref: ghcr.io/lgtm-hq/py-lintro-base:cache
      no-cache: >-
        ${{ startsWith(github.ref, 'refs/tags/')
        || (github.event_name == 'workflow_dispatch'
        && inputs.backfill_version != '') }}
      provenance: false
      sbom: false
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: docker
      # Full list (v0.50.0+ replace semantics): the reusable passes
      # allowed-endpoints verbatim to step-security/harden-runner, so a
      # non-empty value must include the docker preset baseline.
      allowed-endpoints-mode: replace
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        github-releases.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
        ghcr.io:443
        pkg-containers.githubusercontent.com:443
        docker.io:443
        registry-1.docker.io:443
        auth.docker.io:443
        production.cloudflare.docker.com:443
        production.cloudfront.docker.com:443
        deb.debian.org:80
        pypi.org:443
        files.pythonhosted.org:443
        static.rust-lang.org:443
        bun.sh:443
        astral.sh:443
        releases.astral.sh:443
        sh.rustup.rs:443
        registry.npmjs.org:443
        crates.io:443
        static.crates.io:443
        index.crates.io:443
        semgrep.dev:443
        metrics.semgrep.dev:443
