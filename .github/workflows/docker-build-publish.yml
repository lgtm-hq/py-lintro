---
name: Build - Docker Image & Registry
# Builds and publishes Docker images to GHCR via lgtm-ci reusable-docker.
# Called by publish-pypi-on-tag.yml for release tag pushes.

'on':
  workflow_call:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      force_publish:
        description: 'Run publish on this branch (manual testing)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  docker-full:
    name: 🐳 Docker Full Image
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-docker.yml@96a42109637efd4c019d176e0902e3be23295716 # v0.45.1
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      file: Dockerfile
      target: full
      image-name: lgtm-hq/py-lintro
      version: >-
        ${{ startsWith(github.ref, 'refs/tags/')
        && github.ref_name
        || (github.event_name == 'release' && github.event.release.tag_name || '') }}
      push: >-
        ${{ github.event_name != 'pull_request'
        && (github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/tags/')
        || github.event_name == 'release'
        || (github.event_name == 'workflow_dispatch'
        && inputs.force_publish == 'true')) }}
      platforms: linux/amd64,linux/arm64
      runner-map: '{"linux/arm64":"ubuntu-24.04-arm"}'
      smoke-test: lintro --version
      validate-on-pr: false
      cache-registry-ref: ghcr.io/lgtm-hq/py-lintro:cache
      no-cache: ${{ startsWith(github.ref, 'refs/tags/') }}
      provenance: false
      sbom: false
      tooling-ref: '96a42109637efd4c019d176e0902e3be23295716'  # v0.45.1
      egress-policy: block
      egress-preset: docker
      allowed-endpoints-mode: append
      allowed-endpoints: >
        semgrep.dev:443
        metrics.semgrep.dev:443

  docker-base:
    name: 🐳 Docker Base Image
    needs: docker-full
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-docker.yml@96a42109637efd4c019d176e0902e3be23295716 # v0.45.1
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    with:
      file: Dockerfile
      target: base
      image-name: lgtm-hq/py-lintro-base
      version: >-
        ${{ startsWith(github.ref, 'refs/tags/')
        && github.ref_name
        || (github.event_name == 'release' && github.event.release.tag_name || '') }}
      push: >-
        ${{ github.event_name != 'pull_request'
        && (github.ref == 'refs/heads/main'
        || startsWith(github.ref, 'refs/tags/')
        || github.event_name == 'release'
        || (github.event_name == 'workflow_dispatch'
        && inputs.force_publish == 'true')) }}
      platforms: linux/amd64,linux/arm64
      runner-map: '{"linux/arm64":"ubuntu-24.04-arm"}'
      smoke-test: lintro --version
      validate-on-pr: false
      cache-registry-ref: ghcr.io/lgtm-hq/py-lintro-base:cache
      no-cache: ${{ startsWith(github.ref, 'refs/tags/') }}
      provenance: false
      sbom: false
      tooling-ref: '96a42109637efd4c019d176e0902e3be23295716'  # v0.45.1
      egress-policy: block
      egress-preset: docker
      allowed-endpoints-mode: append
      allowed-endpoints: >
        semgrep.dev:443
        metrics.semgrep.dev:443
