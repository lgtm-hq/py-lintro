---
name: Vulnerability Suppression Check

'on':
  schedule:
    # Weekly on Monday at 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: vuln-suppression-check-${{ github.repository }}
  cancel-in-progress: false

jobs:
  check-suppressions:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-vuln-suppression-check.yml@4aaefe64763b7841b6d92d94dc47185083d34c9a # v0.46.0
    # contents:write + pull-requests:write — required for lgtm-ci auto-remediation
    # (opens cleanup PRs when stale/expired suppressions are detected).
    permissions:
      contents: write
      pull-requests: write
    with:
      job-name: '🔍 Check Vulnerability Suppressions'
      tooling-ref: '4aaefe64763b7841b6d92d94dc47185083d34c9a' # v0.46.0
      workflow-file: vuln-suppression-check.yml
      runner-image: ubuntu-24.04
      egress-policy: block
      egress-preset: osv-scanner
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
