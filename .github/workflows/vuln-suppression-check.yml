---
name: Security - Vulnerability Suppression Check

'on':
  schedule:
    # Weekly on Monday at 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: vuln-suppression-check-${{ github.repository }}
  cancel-in-progress: false

jobs:
  check-suppressions:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-vuln-suppression-check.yml@deb53fdb15a630cc60e6e5f35ecb9a8b58966690 # v0.45.2
    permissions:
      contents: write
      pull-requests: write
    with:
      job-name: '🔍 Check Vulnerability Suppressions'
      tooling-ref: 'deb53fdb15a630cc60e6e5f35ecb9a8b58966690' # v0.45.2
      workflow-file: vuln-suppression-check.yml
      runner-image: ubuntu-24.04
      egress-policy: block
      egress-preset: osv-scanner
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
