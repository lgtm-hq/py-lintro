---
name: CI Pipeline

# Gated CI:
#   detect-tool-changes ──→ call-tools-image (PR + tool files changed via workflow_call)
#                      ╲                    ╲
# yamllint disable rule:line-length
#                       ╲──────────────────→ resolve-tools (immutable image ref / artifact fallback) → docker-build ─┬─ lint
#                                                                                                                       ├─ test ──→ publish
#                                                                                                                       └─ security-audit
# yamllint enable rule:line-length
#   manifest-sync (parallel, no Docker)
#   test-matrix   (parallel, no Docker)
# yamllint disable-line rule:line-length
#                                                            test → deploy-pages (main only)
#
# tools-image.yml is called via workflow_call for pull requests that change tool
# files, and resolve-tools chooses the final tools image source for downstream jobs.
# Same-repo runs use pinned/immutable image references, while fork PRs fall back to
# the saved tools-image artifact because they cannot publish to GHCR. Main pushes
# also resolve immutable tools-image references here before docker-build runs.
# Docker image built ONCE and shared via GHCR (ci-<run_id> tags), with artifact
# fallback for fork PRs. Smoke test folded into test job.

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ci-pipeline-${{ github.ref }}
  # Cancel in-progress PR runs on new pushes; never cancel main (publish must complete)
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: {}

env:
  # Per-event cache tag.
  #   pull_request                → pr-<N>           (per-PR isolated)
  #   merge_group                 → mq-<run>         (queue may abort)
  #   push to refs/heads/main     → main
  #   workflow_dispatch on main   → main
  #   workflow_dispatch off main  → dispatch-<run>   (feature dry-runs)
  CACHE_TAG: >-
    ${{
      github.event_name == 'pull_request'
        && format('pr-{0}', github.event.pull_request.number)
      || github.event_name == 'merge_group'
        && format('mq-{0}', github.run_id)
      || github.ref == 'refs/heads/main' && 'main'
      || format('dispatch-{0}', github.run_id)
    }}
  CACHE_OPTS: mode=max,compression=zstd,oci-mediatypes=true,image-manifest=true

jobs:
  # ============================================================================
  # Stage 1a: Detect if tool files changed (drives whether we call tools-image.yml)
  # ============================================================================
  detect-tool-changes:
    name: 🔍 Detect Tool Changes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    outputs:
      tools-changed: ${{ steps.detect.outputs.tools_changed }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect tool file changes
        id: detect
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          # yamllint disable rule:line-length
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha }}
          # yamllint enable rule:line-length
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
        run: scripts/ci/tools-image-detect-changes.sh

  # ============================================================================
  # Stage 1b: Build fresh tools image (PR events with tool changes)
  # Delegates to tools-image.yml via workflow_call — no polling required.
  # ============================================================================
  call-tools-image:
    name: 🔧 Build Tools Image
    needs: detect-tool-changes
    # if: references only github context — NOT needs.outputs — to avoid startup_failure.
    # GitHub rejects reusable-workflow call jobs whose if: references needs outputs.
    # The tools-changed check moves to skip_if_unchanged (runtime with: expression)
    # so startup validation never sees a needs-output reference in this condition.
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    uses: ./.github/workflows/tools-image.yml
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    with:
      # yamllint disable-line rule:line-length
      skip_if_unchanged: ${{ needs.detect-tool-changes.outputs.tools-changed != 'true' }}
      pr_number: ${{ github.event.pull_request.number }}
      # yamllint disable-line rule:line-length
      is_fork_pr: ${{ github.event.pull_request.head.repo.fork && 'true' || 'false' }}

  # ============================================================================
  # Stage 1c: Resolve final tools image reference
  # ============================================================================
  resolve-tools:
    name: 🔧 Resolve Tools Image
    needs: [detect-tool-changes, call-tools-image]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    timeout-minutes: 5
    # Run when detect-tool-changes AND call-tools-image both succeeded or were skipped.
    # call-tools-image skips for push events or PRs without tool changes.
    # yamllint disable rule:line-length
    if: >-
      always() &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false) &&
      needs.detect-tool-changes.result == 'success' &&
      (needs.call-tools-image.result == 'success' || needs.call-tools-image.result == 'skipped')
    # yamllint enable rule:line-length
    outputs:
      image: ${{ steps.resolve.outputs.image }}
      source: ${{ steps.resolve.outputs.source }}
      changed: ${{ needs.detect-tool-changes.outputs.tools-changed }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Resolve tools image
        id: resolve
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          IMAGE_NAME: ghcr.io/lgtm-hq/lintro-tools
          # Use .result (not .outputs) to avoid startup_failure — GitHub rejects
          # workflows where downstream jobs reference .outputs of a conditional
          # reusable-workflow job. The PR tag is deterministic (pr-<number>), so
          # we derive it from PR_NUMBER + CALL_RESULT instead of passing the output.
          CALL_RESULT: ${{ needs.call-tools-image.result }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          IS_FORK_PR: ${{ github.event.pull_request.head.repo.fork }}
          TOOLS_CHANGED: ${{ needs.detect-tool-changes.outputs.tools-changed }}
        run: scripts/ci/tools-image-resolve.sh
      - name: Summary
        env:
          TOOLS_IMAGE: ${{ steps.resolve.outputs.image }}
          TOOLS_SOURCE: ${{ steps.resolve.outputs.source }}
          TOOLS_CHANGED: ${{ needs.detect-tool-changes.outputs.tools-changed }}
        run: scripts/ci/tools-image-resolve-summary.sh

  # ============================================================================
  # Stage 1d: Verify manifest/pyproject version sync (lightweight, no Docker)
  # ============================================================================
  manifest-sync:
    name: 📋 Manifest Sync
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            astral.sh:443
            releases.astral.sh:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Environment setup
        uses: ./.github/actions/setup-env
        with:
          python-version: '3.14'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOOTSTRAP_SKIP_INSTALL_TOOLS: '1'
      - name: Verify manifest sync
        run: python3 scripts/ci/verify-manifest-sync.py
      - name: Verify tool version sync
        run: python3 scripts/ci/verify-tool-version-sync.py

  # ============================================================================
  # Stage 2: Build Docker image ONCE (cached for all subsequent stages)
  # ============================================================================
  docker-build:
    name: 🐳 Build Docker Images
    needs: resolve-tools
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    concurrency:
      group: docker-build-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      is-fork: ${{ steps.fork-check.outputs.is-fork }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            docker.io:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            pypi.org:443
            files.pythonhosted.org:443
            static.rust-lang.org:443
            bun.sh:443
            astral.sh:443
            releases.astral.sh:443
            sh.rustup.rs:443
            deb.debian.org:80
            registry.npmjs.org:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443
            semgrep.dev:443
            metrics.semgrep.dev:443
      - name: Check if fork PR
        id: fork-check
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_FORK_PR: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          IS_FORK="false"
          if [[ "$EVENT_NAME" == "pull_request" && \
                "$IS_FORK_PR" == "true" ]]; then
            IS_FORK="true"
          fi
          echo "is-fork=${IS_FORK}" >> "$GITHUB_OUTPUT"
      # Fork PRs cannot push to GHCR, so they fall back to docker save which
      # duplicates image data on disk. Free pre-installed software to make room.
      # Run BEFORE loading the tools image artifact so docker image prune -af
      # does not delete the freshly loaded image.
      - name: Free disk space (fork fallback)
        if: steps.fork-check.outputs.is-fork == 'true'
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/boost
          sudo docker image prune -af
      - name: Download tools image artifact
        if: needs.resolve-tools.outputs.source == 'artifact'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: tools-image
          path: /tmp/tools-image
      - name: Load tools image artifact
        if: needs.resolve-tools.outputs.source == 'artifact'
        run: docker load -i /tmp/tools-image/tools-image.tar
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Docker Buildx (artifact tools image)
        if: needs.resolve-tools.outputs.source == 'artifact'
        # Action SHA pin exceeds 88 chars
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver: docker
      - name: Set up Docker Buildx (registry tools image)
        if: needs.resolve-tools.outputs.source != 'artifact'
        # Action SHA pin exceeds 88 chars
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GitHub Container Registry
        if: steps.fork-check.outputs.is-fork != 'true'
        # yamllint disable-line rule:line-length
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker image (py-lintro:latest)
        env:
          REPO: ghcr.io/lgtm-hq/py-lintro-buildcache
        # Action SHA pin exceeds 88 chars
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          load: true
          tags: py-lintro:latest
          build-args: |
            TOOLS_IMAGE=${{ needs.resolve-tools.outputs.image }}
          # Registry cache requires the docker-container buildx driver. The
          # artifact path (fork PRs) uses driver:docker which cannot import
          # type=registry refs, so cache-from collapses to empty entries.
          # build-push-action treats blank lines as no-op.
          # yamllint disable rule:line-length
          cache-from: |
            ${{ needs.resolve-tools.outputs.source != 'artifact' && format('type=registry,ref={0}:{1}', env.REPO, env.CACHE_TAG) || '' }}
            ${{ needs.resolve-tools.outputs.source != 'artifact' && format('type=registry,ref={0}:main', env.REPO) || '' }}
          cache-to: ${{ steps.fork-check.outputs.is-fork != 'true' && needs.resolve-tools.outputs.source != 'artifact' && format('type=registry,ref={0}:{1},{2}', env.REPO, env.CACHE_TAG, env.CACHE_OPTS) || '' }}
          # yamllint enable rule:line-length
          provenance: false

      - name: Build Base Docker image (py-lintro:base)
        env:
          REPO: ghcr.io/lgtm-hq/py-lintro-base-buildcache
        # Action SHA pin exceeds 88 chars
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.base
          push: false
          load: true
          tags: py-lintro:base
          # yamllint disable rule:line-length
          cache-from: |
            ${{ needs.resolve-tools.outputs.source != 'artifact' && format('type=registry,ref={0}:{1}', env.REPO, env.CACHE_TAG) || '' }}
            ${{ needs.resolve-tools.outputs.source != 'artifact' && format('type=registry,ref={0}:main', env.REPO) || '' }}
          cache-to: ${{ steps.fork-check.outputs.is-fork != 'true' && needs.resolve-tools.outputs.source != 'artifact' && format('type=registry,ref={0}:{1},{2}', env.REPO, env.CACHE_TAG, env.CACHE_OPTS) || '' }}
          # yamllint enable rule:line-length
          provenance: false
      - name: Push CI images to GHCR
        if: steps.fork-check.outputs.is-fork != 'true'
        env:
          CI_TAG: ci-${{ github.run_id }}
        run: |
          docker tag py-lintro:latest \
            "ghcr.io/lgtm-hq/py-lintro:${CI_TAG}"
          docker tag py-lintro:base \
            "ghcr.io/lgtm-hq/py-lintro-base:${CI_TAG}"
          docker push "ghcr.io/lgtm-hq/py-lintro:${CI_TAG}"
          docker push "ghcr.io/lgtm-hq/py-lintro-base:${CI_TAG}"
      - name: Save Docker images to tarball (fork fallback)
        if: steps.fork-check.outputs.is-fork == 'true'
        run: |
          docker save py-lintro:latest py-lintro:base \
            -o /tmp/py-lintro-images.tar
      - name: Upload Docker images artifact (fork fallback)
        if: steps.fork-check.outputs.is-fork == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: docker-images
          path: /tmp/py-lintro-images.tar
          retention-days: 1

  # ============================================================================
  # Stage 3: Lint (GATED on docker-build)
  # ============================================================================
  lint:
    name: 🛠️ Lintro Code Quality
    needs: [resolve-tools, docker-build, manifest-sync]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    concurrency:
      group: lint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            docker.io:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            pypi.org:443
            files.pythonhosted.org:443
            static.rust-lang.org:443
            bun.sh:443
            astral.sh:443
            releases.astral.sh:443
            sh.rustup.rs:443
            deb.debian.org:80
            registry.npmjs.org:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443
            semgrep.dev:443
            metrics.semgrep.dev:443
            api.osv.dev:443
            api.deps.dev:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to GHCR
        if: needs.docker-build.outputs.is-fork != 'true'
        # yamllint disable-line rule:line-length
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull CI images from GHCR
        if: needs.docker-build.outputs.is-fork != 'true'
        env:
          CI_TAG: ci-${{ github.run_id }}
        run: |
          docker pull "ghcr.io/lgtm-hq/py-lintro:${CI_TAG}"
          docker tag "ghcr.io/lgtm-hq/py-lintro:${CI_TAG}" py-lintro:latest
      - name: Download Docker images artifact (fork fallback)
        if: needs.docker-build.outputs.is-fork == 'true'
        # Action SHA pin exceeds 88 chars
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: docker-images
          path: /tmp
      - name: Load Docker images (fork fallback)
        if: needs.docker-build.outputs.is-fork == 'true'
        run: docker load -i /tmp/py-lintro-images.tar
      - name: Run Lintro Analysis in Docker
        id: lintro
        run: ./scripts/ci/testing/ci-lintro.sh
        continue-on-error: true
      - name: Upload lintro run artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: lintro-run
          path: .lintro/
          retention-days: 7
          if-no-files-found: warn
          # .lintro/ is dotfiled; v6 excludes hidden files by default.
          include-hidden-files: true
      - name: Fail on Linting Issues
        if: ${{ env.CHK_EXIT_CODE != '0' }}
        env:
          CHK_EXIT_CODE: ${{ env.CHK_EXIT_CODE }}
        run: scripts/ci/fail-on-lint.sh

  lint-comment:
    name: 💬 Lintro PR Comment
    needs: lint
    if: >-
      always() &&
      github.event_name == 'pull_request' &&
      needs.lint.result != 'skipped' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: read
      pull-requests: write
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download lintro run artifact
        continue-on-error: true
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: lintro-run
          path: .lintro
      - name: Generate PR Comment
        env:
          CHK_EXIT_CODE: ${{ needs.lint.result == 'success' && '0' || '1' }}
        run: ./scripts/ci/ci-pr-comment.sh
      - name: Comment PR with Lintro Results
        uses: ./.github/actions/post-pr-comment
        with:
          file: pr-comment.txt
          marker: '<!-- lintro-report -->'
          merge-update: 'true'

  # ============================================================================
  # Stage 3b: Python Compatibility Matrix (runs in parallel with Docker test)
  # ============================================================================
  test-matrix:
    name: "\U0001F40D Python Compatibility (${{ matrix.python-version }})"
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 20
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.14']
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            astral.sh:443
            releases.astral.sh:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Environment setup
        uses: ./.github/actions/setup-env
        with:
          python-version: ${{ matrix.python-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOOTSTRAP_SKIP_INSTALL_TOOLS: '1'
      - name: Sync dependencies
        run: uv sync --dev --no-progress
      - name: Run unit and component tests
        run: >
          uv run pytest
          tests/unit tests/cli tests/config tests/formatters
          tests/scripts tests/utils
          -x

  # ============================================================================
  # Stage 3b: Security Audit (parallel with lint and test)
  # ============================================================================
  security-audit:
    name: 🔐 Security Audit
    needs: [docker-build]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    concurrency:
      group: security-audit-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            api.osv.dev:443
            api.deps.dev:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Pull CI image from GHCR
        if: needs.docker-build.outputs.is-fork != 'true'
        env:
          CI_TAG: ci-${{ github.run_id }}
        run: |
          docker pull "ghcr.io/lgtm-hq/py-lintro:${CI_TAG}"
          docker tag "ghcr.io/lgtm-hq/py-lintro:${CI_TAG}" py-lintro:latest
      - name: Download Docker images artifact (fork fallback)
        if: needs.docker-build.outputs.is-fork == 'true'
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: docker-images
          path: /tmp
      - name: Load Docker images (fork fallback)
        if: needs.docker-build.outputs.is-fork == 'true'
        run: docker load -i /tmp/py-lintro-images.tar

      - name: Run security audit
        id: audit
        continue-on-error: true
        run: scripts/ci/security-comment.sh

      - name: Comment PR with security audit results
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: ./.github/actions/post-pr-comment
        with:
          file: security-audit-comment.txt
          marker: '<!-- security-audit-report -->'

      - name: Fail on vulnerabilities
        if: steps.audit.outcome == 'failure'
        run: |
          echo "::error::Security vulnerabilities detected in dependencies"
          exit 1

  # ============================================================================
  # Stage 3c: Test (parallel with lint and security-audit)
  # ============================================================================
  test:
    name: 🧪 Test Suite & Coverage
    needs: [resolve-tools, docker-build]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      pull-requests: write
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    env:
      LINTRO_OUTPUT_DIR: /tmp/lintro
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      coverage-percentage: ${{ steps.coverage.outputs.percentage }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            img.shields.io:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            docker.io:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            pypi.org:443
            files.pythonhosted.org:443
            codecov.io:443
            uploader.codecov.io:443
            storage.googleapis.com:443
            pings.codecov.com:443
            static.rust-lang.org:443
            bun.sh:443
            astral.sh:443
            releases.astral.sh:443
            sh.rustup.rs:443
            deb.debian.org:80
            registry.npmjs.org:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443
            semgrep.dev:443
            metrics.semgrep.dev:443
            api.osv.dev:443
            api.deps.dev:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Log in to GHCR
        if: needs.docker-build.outputs.is-fork != 'true'
        # yamllint disable-line rule:line-length
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull CI images from GHCR
        if: needs.docker-build.outputs.is-fork != 'true'
        env:
          CI_TAG: ci-${{ github.run_id }}
        run: |
          docker pull "ghcr.io/lgtm-hq/py-lintro:${CI_TAG}"
          docker tag "ghcr.io/lgtm-hq/py-lintro:${CI_TAG}" py-lintro:latest
          docker pull "ghcr.io/lgtm-hq/py-lintro-base:${CI_TAG}"
          docker tag "ghcr.io/lgtm-hq/py-lintro-base:${CI_TAG}" py-lintro:base
      - name: Download Docker images artifact (fork fallback)
        if: needs.docker-build.outputs.is-fork == 'true'
        # Action SHA pin exceeds 88 chars
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: docker-images
          path: /tmp
      - name: Load Docker images (fork fallback)
        if: needs.docker-build.outputs.is-fork == 'true'
        run: docker load -i /tmp/py-lintro-images.tar
      # -- Smoke tests (short-circuit before heavy test suite if image is broken) --
      - name: Smoke Test Docker Image (py-lintro:latest)
        run: ./scripts/docker/docker-build-test.sh
      - name: Smoke Test Base Image (py-lintro:base)
        run: docker run --rm py-lintro:base lintro --version
      - name: Set up Docker Buildx
        # Action SHA pin exceeds 88 chars
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Download tools image artifact
        if: needs.resolve-tools.outputs.source == 'artifact'
        # Action SHA pin exceeds 88 chars
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: tools-image
          path: /tmp/tools-image
      - name: Load tools image artifact
        if: needs.resolve-tools.outputs.source == 'artifact'
        run: docker load -i /tmp/tools-image/tools-image.tar
      - name: Pull tools image
        if: needs.resolve-tools.outputs.source != 'artifact'
        env:
          TOOLS_IMAGE: ${{ needs.resolve-tools.outputs.image }}
        run: docker pull "$TOOLS_IMAGE"
      - name: Run comprehensive test suite (with Docker tests)
        env:
          TOOLS_IMAGE: ${{ needs.resolve-tools.outputs.image }}
        run: |
          ./scripts/docker/docker-test.sh 2>&1 | tee test-output.log
          # Preserve exit code from docker-test.sh
          exit "${PIPESTATUS[0]}"
      - name: Extract test summary
        if: always()
        run: |
          chmod +x ./scripts/ci/testing/extract-test-summary.sh
          ./scripts/ci/testing/extract-test-summary.sh \
            test-output.log test-summary.json || true
      - name: Upload test summary artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: test-summary
          path: test-summary.json
          retention-days: 30
          if-no-files-found: warn
      - name: Upload coverage report as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: coverage-report-python-3.14
          path: htmlcov/
          retention-days: 30
      - name: Verify coverage.xml was generated
        run: scripts/ci/testing/verify-coverage-xml.sh
      - name: Upload coverage XML as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30
      - name: Upload .coverage as artifact (if present)
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: ${{ hashFiles('.coverage') != '' }}
        with:
          name: coverage-dotfile
          path: .coverage
          retention-days: 30
      - name: Extract coverage percentage
        id: coverage
        run: ./scripts/ci/testing/ci-extract-coverage.sh
      - name: Enforce coverage threshold (80%)
        if: github.ref == 'refs/heads/main' && success()
        env:
          COVERAGE_PERCENTAGE: ${{ steps.coverage.outputs.percentage }}
        run: bash ./scripts/ci/testing/enforce-coverage-threshold.sh
      - name: Upload coverage to Codecov (always)
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2
        with:
          files: coverage.xml
          flags: python-3.14
          fail_ci_if_error: false
      - name: Generate coverage badge (no commit)
        if: success()
        env:
          COVERAGE_PERCENTAGE: ${{ steps.coverage.outputs.percentage }}
        run: ./scripts/ci/testing/coverage-badge-update.sh
      - name: Upload coverage badge artifact
        if: success()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: coverage-badge
          path: assets/images/coverage-badge.svg

  # ============================================================================
  # Stage 4b: Coverage PR Comment (runs in parallel after test)
  # ============================================================================
  comment-pr-coverage:
    name: 💬 Coverage PR Comment
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            img.shields.io:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download coverage XML artifact (fallback for comment generation)
        if: always()
        continue-on-error: true
        # Action SHA pin exceeds 88 chars
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: coverage-xml
          path: .
      - name: Download test summary artifact
        if: always()
        continue-on-error: true
        # Action SHA pin exceeds 88 chars
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: test-summary
          path: .
      - name: Generate coverage PR comment (always)
        if: always()
        env:
          COVERAGE_PERCENTAGE: ${{ needs.test.outputs.coverage-percentage }}
          JOB_RESULT: ${{ needs.test.result }}
        run: |
          export COVERAGE_PERCENTAGE
          export JOB_RESULT
          ./scripts/ci/github/coverage-pr-comment.sh
      - name: Comment PR with coverage info
        if: >-
          success() &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: ./.github/actions/post-pr-comment
        with:
          file: coverage-pr-comment.txt
          marker: '<!-- coverage-report -->'

  # ============================================================================
  # Stage 4c: Deploy Coverage to GitHub Pages (main only)
  # ============================================================================
  deploy-pages:
    name: 🌐 Deploy Coverage to Pages
    needs: [test]
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    concurrency:
      group: pages-deploy-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download coverage report artifact
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: coverage-report-python-3.14
          path: coverage-report
      - name: Download coverage badge artifact
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: coverage-badge
          path: coverage-badge
      - name: Prepare coverage report directory
        run: ./scripts/ci/pages-deploy.sh --badge-path coverage-badge/coverage-badge.svg
      - name: Deploy coverage to Pages
        id: deployment
        uses: ./.github/actions/pages-deploy
        with:
          path: _site

  # ============================================================================
  # Stage 5: Publish (GATED on test, only main/release)
  # ============================================================================
  publish:
    name: 📦 Publish to GHCR
    needs: [resolve-tools, lint, security-audit, test]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: publish-${{ github.ref }}
      # Never cancel publish jobs mid-push to avoid incomplete registry state
      cancel-in-progress: false
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            docker.io:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            pypi.org:443
            files.pythonhosted.org:443
            static.rust-lang.org:443
            bun.sh:443
            astral.sh:443
            releases.astral.sh:443
            sh.rustup.rs:443
            deb.debian.org:80
            registry.npmjs.org:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443
            semgrep.dev:443
            metrics.semgrep.dev:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Docker (Buildx + login)
        uses: ./.github/actions/setup-docker
        with:
          login: 'true'
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          driver: docker-container
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/lgtm-hq/py-lintro
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
      # Base image uses a separate GHCR package so digest pins for py-lintro
      # cannot accidentally resolve to the minimal (no bundled tools) variant.
      - name: Extract metadata (base)
        id: meta-base
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/lgtm-hq/py-lintro-base
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        env:
          REPO: ghcr.io/lgtm-hq/py-lintro-buildcache
        # Action SHA pin exceeds 88 chars
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TOOLS_IMAGE=${{ needs.resolve-tools.outputs.image }}
          cache-from: |
            type=registry,ref=${{ env.REPO }}:${{ env.CACHE_TAG }}
            type=registry,ref=${{ env.REPO }}:main
          cache-to: >-
            type=registry,ref=${{ env.REPO }}:${{ env.CACHE_TAG }},${{ env.CACHE_OPTS }}
          # Provenance/SBOM disabled: creates untagged OCI child manifests that
          # ghcr_prune_untagged.py deletes, breaking tagged image indexes.
          # Produces simple Docker v2 manifests (like ci-* tags).
          provenance: false
          sbom: false
      - name: Build and push Base Docker image
        env:
          REPO: ghcr.io/lgtm-hq/py-lintro-base-buildcache
        # Action SHA pin exceeds 88 chars
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ${{ steps.meta-base.outputs.tags }}
          labels: ${{ steps.meta-base.outputs.labels }}
          cache-from: |
            type=registry,ref=${{ env.REPO }}:${{ env.CACHE_TAG }}
            type=registry,ref=${{ env.REPO }}:main
          cache-to: >-
            type=registry,ref=${{ env.REPO }}:${{ env.CACHE_TAG }},${{ env.CACHE_OPTS }}
          # Provenance/SBOM disabled: same reason as above.
          provenance: false
          sbom: false

  # ============================================================================
  # Cleanup: Remove ephemeral CI-tagged images from GHCR
  # ============================================================================
  cleanup-ci-images:
    name: 🧹 Cleanup CI Images
    # publish is included so cleanup waits for it on main pushes before
    # deleting CI-tagged images; on PRs publish is skipped and always()
    # lets cleanup proceed without blocking.
    needs: [docker-build, lint, security-audit, test, publish, deploy-pages]
    if: >-
      always() &&
      needs.docker-build.outputs.is-fork != 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    timeout-minutes: 5
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
      - name: Delete CI-tagged images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CI_TAG: ci-${{ github.run_id }}
        run: |
          delete_ci_tag() {
            local pkg="$1"
            local tag="$2"
            echo "Looking up version for ${pkg}:${tag}"
            api_stderr=$(mktemp)
            version_id=$(gh api \
              "orgs/lgtm-hq/packages/container/${pkg}/versions" \
              --paginate \
              --jq ".[] |
                select(.metadata.container.tags[] == \"${tag}\") |
                .id" 2>"$api_stderr") || version_id=""
            stderr_text=$(cat "$api_stderr")
            rm -f "$api_stderr"
            if [[ -n "$stderr_text" ]]; then
              echo "::warning::gh api lookup for ${pkg}:${tag}: ${stderr_text}"
            fi
            if [[ -n "$version_id" ]]; then
              while IFS= read -r vid; do
                [[ -z "$vid" ]] && continue
                gh api --method DELETE \
                  "orgs/lgtm-hq/packages/container/${pkg}/versions/${vid}" \
                  2>/dev/null && \
                  echo "Deleted version ${vid} (${pkg}:${tag})" || \
                  echo "::warning::Failed to delete version ${vid}"
              done <<< "$version_id"
            else
              echo "No version found for ${pkg}:${tag} (may already be cleaned)"
            fi
          }
          delete_ci_tag py-lintro "${CI_TAG}"
          delete_ci_tag py-lintro-base "${CI_TAG}"
