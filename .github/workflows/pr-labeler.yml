---
name: PR - Auto Label

'on':
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-labeler.yml@9416eb2bf71539bcc355e1dcf463a533a0924d74 # v0.55.0
    with:
      configuration-path: .github/labeler.yml
      sync-labels: false
      tooling-ref: '9416eb2bf71539bcc355e1dcf463a533a0924d74' # v0.55.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
