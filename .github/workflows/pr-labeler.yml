---
name: PR - Auto Label

'on':
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-labeler.yml@fe0b8d135c36a8c636b65c3e34f174839313712e
    with:
      configuration-path: .github/labeler.yml
      sync-labels: false
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
      tooling-ref: 'fe0b8d135c36a8c636b65c3e34f174839313712e'
    permissions:
      contents: read
      pull-requests: write
