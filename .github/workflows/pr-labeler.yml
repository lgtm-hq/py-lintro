---
name: PR - Auto Label

'on':
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-labeler.yml@78a5255d51dc2e1e061e4103a95f3ca0c646275d # v0.32.1
    with:
      configuration-path: .github/labeler.yml
      sync-labels: false
      tooling-ref: '78a5255d51dc2e1e061e4103a95f3ca0c646275d' # v0.32.1
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
      pull-requests: write
