---
name: PR - Auto Label

'on':
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

jobs:
  label:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-pr-labeler.yml@d9b302c919efc84fc001e9f3ef63bc9061d04b8f
    with:
      configuration-path: .github/labeler.yml
      sync-labels: false
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
      tooling-ref: 'd9b302c919efc84fc001e9f3ef63bc9061d04b8f'
    permissions:
      contents: read
      pull-requests: write
