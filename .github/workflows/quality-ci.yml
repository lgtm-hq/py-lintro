---
name: CI - Quality

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: quality-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-quality.yml@d9b302c919efc84fc001e9f3ef63bc9061d04b8f
    with:
      post-pr-comment: true
      tooling-ref: 'd9b302c919efc84fc001e9f3ef63bc9061d04b8f'
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        release-assets.githubusercontent.com:443
        objects.githubusercontent.com:443
        ghcr.io:443
        pkg-containers.githubusercontent.com:443
    permissions:
      contents: read
      packages: read
      pull-requests: write
