---
name: Publish - Homebrew Tap

'on':
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag to publish'
        required: true
        type: string
      arch:
        description: 'Target architecture'
        required: false
        default: universal
        type: string
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - x86_64
          - universal

permissions: {}

jobs:
  get-release-info:
    name: Get Release Info
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    # Manual runs use latest release. Tag releases pass inputs.release_tag via
    # workflow_call; the caller's push event is inherited (not workflow_call).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      inputs.release_tag != ''
    outputs:
      release_tag: ${{ steps.get-tag.outputs.tag }}
      is_prerelease: ${{ steps.get-tag.outputs.is_prerelease }}

    steps:
      - name: Checkout scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          sparse-checkout: scripts

      - name: Get release tag
        id: get-tag
        run: scripts/ci/homebrew/get-release-info.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_CALL_RELEASE_TAG: ${{ inputs.release_tag }}

  build-macos:
    name: Build macOS Binary
    needs: get-release-info
    runs-on: ${{ matrix.arch == 'x86_64' && 'macos-15-intel' || 'macos-latest' }}
    permissions:
      contents: write
    strategy:
      matrix:
        arch: >-
          ${{
            inputs.arch != 'universal' &&
            fromJSON(format('["{0}"]', inputs.arch)) ||
            fromJSON('["arm64", "x86_64"]')
          }}

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            astral.sh:443
            releases.astral.sh:443
            uploads.github.com:443
            nuitka.net:443

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: 'latest'

      - name: Install dependencies
        run: |
          uv sync --group build --group dev

      - name: Build binary
        run: |
          uv run python scripts/build/build_macos.py \
            --arch ${{ matrix.arch }} \
            --skip-verify
        env:
          PYTHONUNBUFFERED: '1'

      - name: Verify binary
        run: |
          ls -lh dist/nuitka/
          # Fail if binary can't execute --version (required for valid build)
          ./dist/nuitka/lintro --version
          # Show help output for debugging (non-fatal)
          ./dist/nuitka/lintro --help | head -20 || echo "Help output truncated"

      - name: Rename binary with architecture
        run: |
          mv dist/nuitka/lintro dist/nuitka/lintro-macos-${{ matrix.arch }}

      - name: Calculate SHA256
        id: sha256
        run: |
          BINARY="dist/nuitka/lintro-macos-${{ matrix.arch }}"
          SHA=$(shasum -a 256 "$BINARY" | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256 for ${{ matrix.arch }}: $SHA"

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: lintro-macos-${{ matrix.arch }}
          path: dist/nuitka/lintro-macos-${{ matrix.arch }}
          retention-days: 7

      - name: Save SHA256 to file
        run: |
          echo "${{ steps.sha256.outputs.sha256 }}" > sha256-${{ matrix.arch }}.txt

      - name: Upload SHA256 file
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sha256-${{ matrix.arch }}
          path: sha256-${{ matrix.arch }}.txt
          retention-days: 7

      - name: Upload to release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.get-release-info.outputs.release_tag }}
          files: dist/nuitka/lintro-macos-${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Binary
    needs: get-release-info
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            astral.sh:443
            releases.astral.sh:443
            uploads.github.com:443
            nuitka.net:443

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: 'latest'

      - name: Install dependencies
        run: |
          uv sync --group build --group dev

      - name: Build binary
        run: |
          HOST_ARCH="${{ matrix.arch == 'x64' && 'x86_64' || 'arm64' }}"
          uv run python scripts/build/build_linux.py \
            --arch "$HOST_ARCH" \
            --skip-verify
        env:
          PYTHONUNBUFFERED: '1'

      - name: Verify binary
        run: |
          ls -lh dist/nuitka/
          ./dist/nuitka/lintro --version
          ./dist/nuitka/lintro --help | head -20 || echo "Help output truncated"

      - name: Rename binary with architecture
        run: |
          mv dist/nuitka/lintro dist/nuitka/lintro-linux-${{ matrix.arch }}

      - name: Calculate SHA256
        id: sha256
        run: |
          BINARY="dist/nuitka/lintro-linux-${{ matrix.arch }}"
          SHA=$(sha256sum "$BINARY" | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256 for linux-${{ matrix.arch }}: $SHA"

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: lintro-linux-${{ matrix.arch }}
          path: dist/nuitka/lintro-linux-${{ matrix.arch }}
          retention-days: 7

      - name: Save SHA256 to file
        env:
          SHA256: ${{ steps.sha256.outputs.sha256 }}
        run: |
          echo "$SHA256" > sha256-linux-${{ matrix.arch }}.txt

      - name: Upload SHA256 file
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sha256-linux-${{ matrix.arch }}
          path: sha256-linux-${{ matrix.arch }}.txt
          retention-days: 7

      - name: Upload to release
        if: inputs.release_tag != ''
        # yamllint disable-line rule:line-length
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.get-release-info.outputs.release_tag }}
          files: dist/nuitka/lintro-linux-${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-universal-binary:
    name: Create Universal Binary
    needs: [get-release-info, build-macos]
    runs-on: macos-latest
    permissions:
      contents: write
    if: inputs.arch == 'universal'

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            uploads.github.com:443

      - name: Download arm64 binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: lintro-macos-arm64
          path: binaries/

      - name: Download x86_64 binary
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: lintro-macos-x86_64
          path: binaries/

      - name: Create universal binary
        run: |
          lipo -create \
            binaries/lintro-macos-arm64 \
            binaries/lintro-macos-x86_64 \
            -output binaries/lintro-macos-universal
          chmod +x binaries/lintro-macos-universal

      - name: Verify universal binary
        run: |
          file binaries/lintro-macos-universal
          ls -lh binaries/lintro-macos-universal

      - name: Upload universal artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: lintro-macos-universal
          path: binaries/lintro-macos-universal
          retention-days: 7

      - name: Upload to release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ needs.get-release-info.outputs.release_tag }}
          files: binaries/lintro-macos-universal
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  homebrew-dispatch:
    name: Notify Homebrew Tap
    needs: [get-release-info, build-macos]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    # Stable tag releases only. The tap's formulas/lintro.yml declares a
    # binary formula, so the dispatch must carry both macOS checksums:
    # a failed binary build blocks the formula update (re-run this workflow
    # to recover) instead of shipping a partial bump.
    if: >-
      inputs.release_tag != '' &&
      needs.get-release-info.outputs.release_tag != '' &&
      needs.get-release-info.outputs.is_prerelease == 'false'

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            actions.githubusercontent.com:443
            pypi.org:443

      - name: Checkout scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          sparse-checkout: scripts
          persist-credentials: false

      - name: Download SHA256 artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: sha256-*
          path: checksums/
          merge-multiple: true

      - name: Read checksums
        id: checksums
        run: |
          ARM64_SHA=$(cat checksums/sha256-arm64.txt)
          X86_64_SHA=$(cat checksums/sha256-x86_64.txt)
          echo "arm64_sha256=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_64_sha256=$X86_64_SHA" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ needs.get-release-info.outputs.release_tag }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI availability
        # The tap generates lintro-full from live PyPI metadata as soon as
        # the dispatch lands, so the sdist must be visible first.
        # yamllint disable-line rule:line-length
        run: scripts/ci/homebrew/wait-for-pypi.sh lintro "${{ steps.version.outputs.version }}"

      - name: Dispatch formula update
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/trigger-homebrew-update@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
        with:
          formula: lintro
          version: ${{ steps.version.outputs.version }}
          pypi-package: lintro
          binary-arm64-sha: ${{ steps.checksums.outputs.arm64_sha256 }}
          binary-x86-sha: ${{ steps.checksums.outputs.x86_64_sha256 }}
          token: ${{ secrets.HOMEBREW_TAP_DISPATCH_TOKEN }}
