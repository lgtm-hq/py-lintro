---
name: Publish - Homebrew Tap

'on':
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag to publish'
        required: true
        type: string
      arch:
        description: 'Target architecture'
        required: false
        default: universal
        type: string
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - x86_64
          - universal

permissions: {}

# Exact uv pin so setup-uv's ExactVersionResolver skips resolving "latest"
# via astral-sh/versions uv.ndjson (the dominant tag-publish flake under
# harden-runner). Keep in sync with docker/tools.Dockerfile ARG UV_VERSION.
# Artifact URL lookup may still consult the manifest, so the continue-on-error
# retry below remains as belt-and-suspenders (#1487, #1513).
env:
  UV_VERSION: '0.11.29'

jobs:
  get-release-info:
    name: Get Release Info
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    # Manual runs use latest release. Tag releases pass inputs.release_tag via
    # workflow_call; the caller's push event is inherited (not workflow_call).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      inputs.release_tag != ''
    outputs:
      release_tag: ${{ steps.get-tag.outputs.tag }}
      is_prerelease: ${{ steps.get-tag.outputs.is_prerelease }}

    steps:
      - name: Checkout scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: scripts

      - name: Get release tag
        id: get-tag
        run: scripts/ci/homebrew/get-release-info.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_CALL_RELEASE_TAG: ${{ inputs.release_tag }}

  generate-man-page:
    name: Generate Man Page
    needs: get-release-info
    runs-on: ubuntu-24.04
    permissions:
      # Required by softprops/action-gh-release to upload dist/lintro.1.
      contents: write
    if: >-
      github.event_name == 'workflow_dispatch' ||
      inputs.release_tag != ''

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            astral.sh:443
            releases.astral.sh:443
            uploads.github.com:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.14'

      - name: Install uv
        id: setup-uv
        continue-on-error: true
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install uv (retry)
        if: steps.setup-uv.outcome == 'failure'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Generate man page
        run: uv run python scripts/generate-man-page.py --output dist/lintro.1

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lintro-man-page
          path: dist/lintro.1
          retention-days: 7

      - name: Upload to release
        if: inputs.release_tag != ''
        # yamllint disable-line rule:line-length
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.get-release-info.outputs.release_tag }}
          files: dist/lintro.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS Binary
    needs: get-release-info
    runs-on: ${{ matrix.arch == 'x86_64' && 'macos-15-intel' || 'macos-latest' }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        arch: >-
          ${{
            inputs.arch != 'universal' &&
            fromJSON(format('["{0}"]', inputs.arch)) ||
            fromJSON('["arm64", "x86_64"]')
          }}

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            astral.sh:443
            releases.astral.sh:443
            uploads.github.com:443
            nuitka.net:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.14'

      - name: Install uv
        id: setup-uv
        continue-on-error: true
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      # First connections after the harden-runner network extension activates
      # can stall past setup-uv's manifest-fetch timeout (macOS especially);
      # one retry runs on a warm network path. See #1513 / #1487.
      - name: Install uv (retry)
        if: steps.setup-uv.outcome == 'failure'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: |
          uv sync --group build --group dev

      - name: Build binary
        run: |
          uv run python scripts/build/build_macos.py \
            --arch ${{ matrix.arch }} \
            --skip-verify
        env:
          PYTHONUNBUFFERED: '1'

      - name: Verify binary
        run: |
          ls -lh dist/nuitka/
          # Fail if binary can't execute --version (required for valid build)
          ./dist/nuitka/lintro --version
          # Show help output for debugging (non-fatal)
          ./dist/nuitka/lintro --help | head -20 || echo "Help output truncated"

      - name: Rename binary with architecture
        run: |
          mv dist/nuitka/lintro dist/nuitka/lintro-macos-${{ matrix.arch }}

      - name: Calculate SHA256
        id: sha256
        run: |
          BINARY="dist/nuitka/lintro-macos-${{ matrix.arch }}"
          SHA=$(shasum -a 256 "$BINARY" | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256 for ${{ matrix.arch }}: $SHA"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lintro-macos-${{ matrix.arch }}
          path: dist/nuitka/lintro-macos-${{ matrix.arch }}
          retention-days: 7

      - name: Save SHA256 to file
        run: |
          echo "${{ steps.sha256.outputs.sha256 }}" > sha256-${{ matrix.arch }}.txt

      - name: Upload SHA256 file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sha256-${{ matrix.arch }}
          path: sha256-${{ matrix.arch }}.txt
          retention-days: 7

      - name: Upload to release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.get-release-info.outputs.release_tag }}
          files: dist/nuitka/lintro-macos-${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    name: Build Linux Binary
    needs: get-release-info
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            astral.sh:443
            releases.astral.sh:443
            uploads.github.com:443
            nuitka.net:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.14'

      - name: Install uv
        id: setup-uv
        continue-on-error: true
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      # First connections after harden-runner's egress filtering activates
      # can stall past setup-uv's manifest-fetch timeout;
      # one retry runs on a warm network path. See #1513 / #1487.
      - name: Install uv (retry)
        if: steps.setup-uv.outcome == 'failure'
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}

      - name: Install dependencies
        run: |
          uv sync --group build --group dev

      - name: Build binary
        run: |
          HOST_ARCH="${{ matrix.arch == 'x64' && 'x86_64' || 'arm64' }}"
          uv run python scripts/build/build_linux.py \
            --arch "$HOST_ARCH" \
            --skip-verify
        env:
          PYTHONUNBUFFERED: '1'

      - name: Verify binary
        run: |
          ls -lh dist/nuitka/
          ./dist/nuitka/lintro --version
          ./dist/nuitka/lintro --help | head -20 || echo "Help output truncated"

      - name: Rename binary with architecture
        run: |
          mv dist/nuitka/lintro dist/nuitka/lintro-linux-${{ matrix.arch }}

      - name: Calculate SHA256
        id: sha256
        run: |
          BINARY="dist/nuitka/lintro-linux-${{ matrix.arch }}"
          SHA=$(sha256sum "$BINARY" | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256 for linux-${{ matrix.arch }}: $SHA"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lintro-linux-${{ matrix.arch }}
          path: dist/nuitka/lintro-linux-${{ matrix.arch }}
          retention-days: 7

      - name: Save SHA256 to file
        env:
          SHA256: ${{ steps.sha256.outputs.sha256 }}
        run: |
          echo "$SHA256" > sha256-linux-${{ matrix.arch }}.txt

      - name: Upload SHA256 file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sha256-linux-${{ matrix.arch }}
          path: sha256-linux-${{ matrix.arch }}.txt
          retention-days: 7

      - name: Upload to release
        if: inputs.release_tag != ''
        # yamllint disable-line rule:line-length
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.get-release-info.outputs.release_tag }}
          files: dist/nuitka/lintro-linux-${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-universal-binary:
    name: Create Universal Binary
    needs: [get-release-info, build-macos]
    runs-on: macos-latest
    permissions:
      contents: write
    if: inputs.arch == 'universal'

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            uploads.github.com:443

      - name: Download arm64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: lintro-macos-arm64
          path: binaries/

      - name: Download x86_64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: lintro-macos-x86_64
          path: binaries/

      - name: Create universal binary
        run: |
          lipo -create \
            binaries/lintro-macos-arm64 \
            binaries/lintro-macos-x86_64 \
            -output binaries/lintro-macos-universal
          chmod +x binaries/lintro-macos-universal

      - name: Verify universal binary
        run: |
          file binaries/lintro-macos-universal
          ls -lh binaries/lintro-macos-universal

      - name: Upload universal artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lintro-macos-universal
          path: binaries/lintro-macos-universal
          retention-days: 7

      - name: Upload to release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.get-release-info.outputs.release_tag }}
          files: binaries/lintro-macos-universal
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  homebrew-dispatch:
    name: Notify Homebrew Tap
    needs: [get-release-info, build-macos, generate-man-page]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    # Stable tag releases only. The tap's formulas/lintro.yml declares a
    # binary formula, so the dispatch must carry both macOS checksums:
    # a failed binary build blocks the formula update (re-run this workflow
    # to recover) instead of shipping a partial bump. The universal guard
    # keeps single-arch workflow_call runs from failing on a missing
    # checksum artifact.
    if: >-
      inputs.release_tag != '' &&
      inputs.arch == 'universal' &&
      needs.get-release-info.outputs.release_tag != '' &&
      needs.get-release-info.outputs.is_prerelease == 'false'

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            actions.githubusercontent.com:443
            pypi.org:443

      - name: Checkout scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          sparse-checkout: scripts
          persist-credentials: false

      - name: Download SHA256 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sha256-*
          path: checksums/
          merge-multiple: true

      - name: Read checksums
        id: checksums
        run: |
          ARM64_SHA=$(cat checksums/sha256-arm64.txt)
          X86_64_SHA=$(cat checksums/sha256-x86_64.txt)
          echo "arm64_sha256=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_64_sha256=$X86_64_SHA" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: version
        env:
          TAG: ${{ needs.get-release-info.outputs.release_tag }}
        run: |
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI availability
        # The tap generates lintro-full from live PyPI metadata as soon as
        # the dispatch lands, so the sdist must be visible first.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: scripts/ci/homebrew/wait-for-pypi.sh lintro "$VERSION"

      - name: Dispatch formula update
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/trigger-homebrew-update@31c25ef2e8992960e218524780e34f44f51271b5 # v0.54.0
        with:
          formula: lintro
          version: ${{ steps.version.outputs.version }}
          pypi-package: lintro
          binary-arm64-sha: ${{ steps.checksums.outputs.arm64_sha256 }}
          binary-x86-sha: ${{ steps.checksums.outputs.x86_64_sha256 }}
          token: ${{ secrets.HOMEBREW_TAP_DISPATCH_TOKEN }}
