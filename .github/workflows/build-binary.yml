---
name: Publish - Homebrew Tap

'on':
  workflow_call:
    inputs:
      release_tag:
        description: 'Release tag to publish'
        required: true
        type: string
      arch:
        description: 'Target architecture'
        required: false
        default: universal
        type: string
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture'
        required: true
        default: 'arm64'
        type: choice
        options:
          - arm64
          - x86_64
          - universal

permissions: {}

jobs:
  get-release-info:
    name: Get Release Info
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    # Manual runs use latest release. Tag releases pass inputs.release_tag via
    # workflow_call; the caller's push event is inherited (not workflow_call).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      inputs.release_tag != ''
    outputs:
      release_tag: ${{ steps.get-tag.outputs.tag }}
      is_prerelease: ${{ steps.get-tag.outputs.is_prerelease }}

    steps:
      - name: Checkout scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          sparse-checkout: scripts

      - name: Get release tag
        id: get-tag
        run: scripts/ci/homebrew/get-release-info.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_CALL_RELEASE_TAG: ${{ inputs.release_tag }}

  build-macos:
    name: Build macOS Binary
    needs: get-release-info
    runs-on: ${{ matrix.arch == 'x86_64' && 'macos-15-intel' || 'macos-latest' }}
    permissions:
      contents: write
    strategy:
      matrix:
        arch: >-
          ${{
            inputs.arch != 'universal' &&
            fromJSON(format('["{0}"]', inputs.arch)) ||
            fromJSON('["arm64", "x86_64"]')
          }}

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            uploads.github.com:443
            nuitka.net:443

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: 'latest'

      - name: Install dependencies
        run: |
          uv sync --group build --group dev

      - name: Build binary
        run: |
          uv run python scripts/build/build_macos.py \
            --arch ${{ matrix.arch }} \
            --skip-verify
        env:
          PYTHONUNBUFFERED: '1'

      - name: Verify binary
        run: |
          ls -lh dist/nuitka/
          # Fail if binary can't execute --version (required for valid build)
          ./dist/nuitka/lintro --version
          # Show help output for debugging (non-fatal)
          ./dist/nuitka/lintro --help | head -20 || echo "Help output truncated"

      - name: Rename binary with architecture
        run: |
          mv dist/nuitka/lintro dist/nuitka/lintro-macos-${{ matrix.arch }}

      - name: Calculate SHA256
        id: sha256
        run: |
          BINARY="dist/nuitka/lintro-macos-${{ matrix.arch }}"
          SHA=$(shasum -a 256 "$BINARY" | cut -d' ' -f1)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "SHA256 for ${{ matrix.arch }}: $SHA"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lintro-macos-${{ matrix.arch }}
          path: dist/nuitka/lintro-macos-${{ matrix.arch }}
          retention-days: 7

      - name: Save SHA256 to file
        run: |
          echo "${{ steps.sha256.outputs.sha256 }}" > sha256-${{ matrix.arch }}.txt

      - name: Upload SHA256 file
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sha256-${{ matrix.arch }}
          path: sha256-${{ matrix.arch }}.txt
          retention-days: 7

      - name: Upload to release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ needs.get-release-info.outputs.release_tag }}
          files: dist/nuitka/lintro-macos-${{ matrix.arch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-universal-binary:
    name: Create Universal Binary
    needs: [get-release-info, build-macos]
    runs-on: macos-latest
    permissions:
      contents: write
    if: inputs.arch == 'universal'

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            uploads.github.com:443

      - name: Download arm64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: lintro-macos-arm64
          path: binaries/

      - name: Download x86_64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: lintro-macos-x86_64
          path: binaries/

      - name: Create universal binary
        run: |
          lipo -create \
            binaries/lintro-macos-arm64 \
            binaries/lintro-macos-x86_64 \
            -output binaries/lintro-macos-universal
          chmod +x binaries/lintro-macos-universal

      - name: Verify universal binary
        run: |
          file binaries/lintro-macos-universal
          ls -lh binaries/lintro-macos-universal

      - name: Upload universal artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lintro-macos-universal
          path: binaries/lintro-macos-universal
          retention-days: 7

      - name: Upload to release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ needs.get-release-info.outputs.release_tag }}
          files: binaries/lintro-macos-universal
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Tap
    needs: [get-release-info, build-macos]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    if: >-
      always() &&
      !cancelled() &&
      inputs.release_tag != '' &&
      needs.get-release-info.result == 'success' &&
      needs.get-release-info.outputs.release_tag != '' &&
      needs.get-release-info.outputs.is_prerelease == 'false'

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443

      - name: Checkout lintro scripts and actions
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          sparse-checkout: |
            scripts
            .github/actions
          path: lintro

      - name: Download SHA256 artifacts
        if: ${{ needs.build-macos.result == 'success' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: sha256-*
          path: checksums/
          merge-multiple: true

      - name: Read checksums
        if: ${{ needs.build-macos.result == 'success' }}
        id: checksums
        run: |
          ARM64_SHA=$(cat checksums/sha256-arm64.txt)
          X86_64_SHA=$(cat checksums/sha256-x86_64.txt)
          echo "arm64_sha256=$ARM64_SHA" >> "$GITHUB_OUTPUT"
          echo "x86_64_sha256=$X86_64_SHA" >> "$GITHUB_OUTPUT"
          echo "ARM64 SHA256: $ARM64_SHA"
          echo "x86_64 SHA256: $X86_64_SHA"

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ needs.get-release-info.outputs.release_tag }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION from tag: $TAG"

      - name: Wait for PyPI availability
        # yamllint disable-line rule:line-length
        run: lintro/scripts/ci/homebrew/wait-for-pypi.sh lintro "${{ steps.version.outputs.version }}"

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'

      - name: Create Homebrew tap GitHub App token
        id: homebrew-app-token
        # yamllint disable-line rule:line-length
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: lgtm-hq
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout homebrew-tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: lgtm-hq/homebrew-tap
          token: ${{ steps.homebrew-app-token.outputs.token }}
          path: homebrew-tap

      - name: Generate PyPI formula (lintro-full)
        run: |
          lintro/scripts/ci/homebrew/generate-pypi-formula.sh \
            "${{ steps.version.outputs.version }}" \
            "homebrew-tap/Formula/lintro-full.rb"

      - name: Generate binary formula (lintro)
        if: ${{ needs.build-macos.result == 'success' }}
        run: |
          lintro/scripts/ci/homebrew/generate-binary-formula.sh \
            "${{ steps.version.outputs.version }}" \
            "${{ steps.checksums.outputs.arm64_sha256 }}" \
            "${{ steps.checksums.outputs.x86_64_sha256 }}" \
            "homebrew-tap/Formula/lintro.rb"

      - name: Create Homebrew tap PR
        env:
          GH_TOKEN: ${{ steps.homebrew-app-token.outputs.token }}
          WORKING_DIR: homebrew-tap
          PR_BRANCH: homebrew/lintro-${{ steps.version.outputs.version }}
          PR_TITLE: >-
            chore(homebrew): update lintro to
            ${{ steps.version.outputs.version }}
          PR_BODY: |
            Updates applicable Homebrew formulas for lintro
            ${{ steps.version.outputs.version }}:

            - `Formula/lintro.rb` (lightweight binary) when macOS binaries are available
            - `Formula/lintro-full.rb` (PyPI + bundled tools)

            The tap repository merges this PR automatically after `validate-formula`
            succeeds (release-bot merge workflow).
        run: >-
          lintro/scripts/ci/homebrew/create-lintro-tap-pr.sh
          "${{ steps.version.outputs.version }}"
          --skip-if-empty
