---
name: Security - CodeQL Code Scanning

'on':
  push:
    branches: [main]
    paths: ['**.py', 'pyproject.toml', '.github/**']
  pull_request:
    branches: [main]
    # No paths filter: `codeql / CodeQL` is a required status check, and a
    # path-filtered workflow that does not run leaves that context absent
    # (not skipped), which permanently blocks the merge queue for PRs that
    # touch only non-matching files (docs, npm/, etc.). Always run on PRs so
    # the required check always reports.
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  codeql:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-codeql.yml@1014e3d7d5441a63215d2096545a46cff6de101c # v0.48.0
    with:
      languages: python
      build-mode: none
      config-file: .github/codeql/codeql-config.yml
      category: '/language:all'
      tooling-ref: '1014e3d7d5441a63215d2096545a46cff6de101c' # v0.48.0
      egress-policy: block
      egress-preset: github-tooling
      allowed-endpoints-mode: append
      allowed-endpoints: release-assets.githubusercontent.com:443
    permissions:
      contents: read
      security-events: write
