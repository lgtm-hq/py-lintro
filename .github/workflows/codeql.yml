---
name: Security - CodeQL Code Scanning

'on':
  push:
    branches: [main]
    paths: ['**.py', 'pyproject.toml', '.github/**']
  pull_request:
    branches: [main]
    # No paths filter: `codeql / 🔬 CodeQL Analysis` is a required status
    # check, and a
    # path-filtered workflow that does not run leaves that context absent
    # (not skipped), which permanently blocks the merge queue for PRs that
    # touch only non-matching files (docs, npm/, etc.). Always run on PRs so
    # the required check always reports.
  merge_group:
    types: [checks_requested]
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  codeql:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-codeql.yml@768a6b72f0a5346b5ecba3f4e13b90040472341c # v0.52.4
    with:
      # Org ruleset (checks-py-lintro): codeql / 🔬 CodeQL Analysis
      job-name: '🔬 CodeQL Analysis'
      languages: python
      build-mode: none
      config-file: .github/codeql/codeql-config.yml
      category: '/language:all'
      tooling-ref: '768a6b72f0a5346b5ecba3f4e13b90040472341c' # v0.52.4
      egress-policy: block
      egress-preset: github-tooling
      # Full list (v0.50.0+ replace semantics): the reusable passes
      # allowed-endpoints verbatim to step-security/harden-runner, so a
      # non-empty value must include the github-tooling baseline.
      allowed-endpoints-mode: replace
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        uploads.github.com:443
        pipelines.actions.githubusercontent.com:443
        release-assets.githubusercontent.com:443
    permissions:
      contents: read
      security-events: write
