---
name: Release - Auto Tag

'on':
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-auto-tag-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-tag:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-auto-tag.yml@4c36e28118ecf4f63df55e4a68b850d5e2697975
    with:
      create-release: false
      tooling-ref: '4c36e28118ecf4f63df55e4a68b850d5e2697975'
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        release-assets.githubusercontent.com:443
        objects.githubusercontent.com:443
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    permissions:
      contents: write
