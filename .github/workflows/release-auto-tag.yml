---
name: Release - Auto Tag

# Surface trigger context in the Actions history so post-merge release failures
# are traceable at a glance (event + branch), not just via the default commit
# subject. Guarded by test_release_workflows_define_traceable_run_names.
run-name: >-
  Release - Auto Tag (${{ github.event_name }} on ${{ github.ref_name }})

'on':
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: release-auto-tag-${{ github.repository }}
  cancel-in-progress: false

jobs:
  auto-tag:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-release-auto-tag.yml@ee8484ca71db3a2c2c33da6128bbf2330fcd7c88 # v0.59.2
    with:
      create-release: false
      tooling-ref: 'ee8484ca71db3a2c2c33da6128bbf2330fcd7c88'  # v0.59.2
      egress-policy: block
      # Paired with release-version-pr.yml (egress-preset: pypi).
      # Guarded by test_release_workflows_use_paired_egress_presets.
      egress-preset: github-tooling
    secrets:
      RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
      RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
    permissions:
      actions: read # report-release-failure reads workflow/job metadata
      contents: write # create and push release tags
      issues: write # report-release-failure opens deduplicated failure issues
