---
name: Security - OpenSSF Scorecard Analysis

'on':
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions: {}

concurrency:
  group: scorecards-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecards:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-scorecards.yml@d3918c686e4489a3b4c3a6fec1446d080ffda86e # v0.23.0
    with:
      egress-policy: block
      allowed-endpoints: >
        agent.api.stepsecurity.io:443
        api.deps.dev:443
        api.github.com:443
        api.osv.dev:443
        api.scorecard.dev:443
        codeload.github.com:443
        fulcio.sigstore.dev:443
        github.com:443
        objects.githubusercontent.com:443
        oss-fuzz-build-logs.storage.googleapis.com:443
        ossf.github.io:443
        release-assets.githubusercontent.com:443
        rekor.sigstore.dev:443
        sigstore.dev:443
        tuf-repo-cdn.sigstore.dev:443
        www.bestpractices.dev:443
    permissions:
      contents: read
      security-events: write
      id-token: write
