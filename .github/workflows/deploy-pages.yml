# SPDX-License-Identifier: MIT
---
name: Deploy - GitHub Pages

'on':
  workflow_run:
    workflows:
      - CI - Tests
      - Quality - Documentation Site
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  deploy:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main') ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    permissions:
      contents: read
      pages: write
      id-token: write
      # write: reusable-deploy-site-with-reports v0.52.3 requests actions:
      # write (self-heal rerun artifact pruning, lgtm-ci#415); a lower caller
      # grant is a parse-time startup_failure
      actions: write
    # v0.32.4+ passes github.token as GH_TOKEN into bundle-workflow-artifacts
    # (lgtm-ci#300). v0.32.3 left gh unauthenticated and blocked Pages deploy
    # after #974 (see #1227). Pin with the repo-standard v0.52.3 tooling.
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-deploy-site-with-reports.yml@768a6b72f0a5346b5ecba3f4e13b90040472341c # v0.52.3
    with:
      site-root: apps/site/dist
      build-command: bash scripts/ci/site/build.sh
      package-manager: bun
      node-version: '22'
      working-directory: apps/site
      bundle-manifest: .github/pages-bundle-manifest.json
      commit-sha: ${{ github.event.workflow_run.head_sha || github.sha }}
      fallback-ref: main
      tooling-ref: '768a6b72f0a5346b5ecba3f4e13b90040472341c' # v0.52.3
      # Since lgtm-ci v0.50.0 the enforcing harden-runner step runs before
      # preset resolution, and harden-runner splits allowed-endpoints on
      # spaces, so the reusable's newline-separated per-job defaults collapse
      # into one unmatchable token — even github.com is dropped at checkout
      # (#1299, class of #1287 / lgtm-hq/lgtm-ci#512). Pass the complete
      # lists explicitly as space-separated folded scalars; contents mirror
      # the playwright (build) and github-pages (deploy) presets that
      # governed these jobs when they last passed (v0.48.0).
      allowed-endpoints-build: >-
        github.com:443
        api.github.com:443
        actions.githubusercontent.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
        registry.npmjs.org:443
        bun.sh:443
        cdn.playwright.dev:443
        playwright.azureedge.net:443
        playwright-akamai.azureedge.net:443
        archive.ubuntu.com:80
        security.ubuntu.com:80
      allowed-endpoints-deploy: >-
        github.com:443
        api.github.com:443
        actions.githubusercontent.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        release-assets.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
      build-job-name: Build site and bundle reports
      deploy-job-name: Deploy to GitHub Pages
      runner-image: ubuntu-24.04
      timeout-minutes: 20
