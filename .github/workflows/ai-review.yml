---
name: AI Review - Dogfood

# Dogfood `lintro review` on py-lintro's own pull requests.
#
# Trusted install: lintro is installed from the PR's BASE ref (main), never the
# PR head, so PR-controlled code never executes with the ANTHROPIC_API_KEY in
# scope. The PR is still reviewed — `lintro review --pr <N>` fetches the diff
# through `gh` (GitHub API), so the PR's lintro/** changes are reviewed as data,
# never run with the key. See the security note on the job below.
#
# Posts a review comment: the review runs with `--post`, so lintro maintains a
# single sticky comment on the PR (rich findings + cumulative telemetry) and
# posts inline review comments for diff-mappable findings. It runs with
# continue-on-error and the script always exits 0, so it can never fail a PR.
# When the ANTHROPIC_API_KEY secret is absent (not configured yet, or a fork PR
# that cannot read secrets) the script skips gracefully. This is intentionally
# NOT a required check.
#
# ACTIVATION PRECONDITION (audited #1317, follow-up to #1072/#1074):
# Safe to add the ANTHROPIC_API_KEY repository secret only when all of the
# following hold (structurally asserted in tests/scripts/test_run_ai_review.py):
#   1. Job if-guard: non-draft, same-repository PRs only (fork PRs never run).
#   2. Trusted install: checkout ref is pull_request.base.sha, never PR head.
#   3. Secret ordering: ANTHROPIC_API_KEY is injected only into the final
#      review step env, after the trusted base-ref checkout and uv sync.
# No GitHub Environment gate is required once (1–3) hold; the trusted-install
# mechanism from #1074 is the primary control. Re-audit if the checkout ref,
# job guard, or secret injection site changes.

'on':
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'lintro/**'

permissions: {}

concurrency:
  group: ai-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: AI Review
    runs-on: ubuntu-24.04
    # Fully informational: any failure (setup, egress, checkout, or the review
    # step itself) is non-blocking and never fails the PR.
    continue-on-error: true
    # Skip draft PRs and never run for fork PRs. Fork PRs already cannot read
    # secrets, but requiring head.repo == the base repo makes it explicit that
    # the keyed job only runs for same-repository pull requests.
    #
    # SECURITY: lintro is installed from the PR's trusted BASE ref
    # (pull_request.base.sha, i.e. main), never the PR head, so the code that
    # runs with the ANTHROPIC_API_KEY secret is always trusted — a PR cannot
    # substitute its own lintro/** to exfiltrate the key. The PR is reviewed as
    # data: `lintro review --pr <N>` fetches the diff via `gh` (GitHub API), it
    # does not execute the PR's working tree. Trade-off: a PR that breaks the
    # review code itself won't be caught by this job (that is covered by the
    # unit tests in tests/), which is the correct security posture. The
    # ANTHROPIC_API_KEY secret is therefore safe to enable.
    if: >-
      github.event.pull_request.draft == false
      && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      # `--post` maintains the sticky review comment and posts inline review
      # comments, both of which require write access to pull requests.
      pull-requests: write
    timeout-minutes: 15

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            api.anthropic.com:443
            astral.sh:443
            releases.astral.sh:443
            pypi.org:443
            files.pythonhosted.org:443

      - name: Checkout base ref (trusted lintro install)
        # Install lintro from the PR's BASE ref (main), NOT the PR head. The
        # code that runs with ANTHROPIC_API_KEY must be trusted; the PR diff is
        # fetched separately via `gh` in the review step. base.sha is the exact
        # commit the PR targets and is already merged into main, so it is safe.
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv sync --extra ai

      - name: Run AI review (posts comment, non-blocking)
        continue-on-error: true
        run: scripts/ci/run-ai-review.sh
        env:
          PR_NUMBER: ${{ github.event.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_REVIEW_MAX_COST_USD: '0.50'
