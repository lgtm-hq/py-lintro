---
name: Maintenance - GHCR Registry Cleanup

'on':
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, no deletions)'
        required: false
        default: false
        type: boolean
      min_age_days:
        description: 'Minimum age in days before deleting untagged images'
        required: false
        default: 7
        type: number

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions: {}

jobs:
  prune-untagged:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-ghcr-cleanup.yml@deb53fdb15a630cc60e6e5f35ecb9a8b58966690 # v0.45.2
    permissions:
      contents: read
      packages: write
    with:
      package-name: py-lintro
      min-age-days: ${{ inputs.min_age_days || 7 }}
      dry-run: ${{ inputs.dry_run == true }}
      tooling-ref: 'deb53fdb15a630cc60e6e5f35ecb9a8b58966690' # v0.45.2
      egress-policy: audit
      runner-image: ubuntu-24.04
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  prune-untagged-base:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-ghcr-cleanup.yml@deb53fdb15a630cc60e6e5f35ecb9a8b58966690 # v0.45.2
    permissions:
      contents: read
      packages: write
    with:
      package-name: py-lintro-base
      min-age-days: ${{ inputs.min_age_days || 7 }}
      dry-run: ${{ inputs.dry_run == true }}
      tooling-ref: 'deb53fdb15a630cc60e6e5f35ecb9a8b58966690' # v0.45.2
      egress-policy: audit
      runner-image: ubuntu-24.04
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
