---
name: Maintenance - GHCR Registry Cleanup
# Weekly cleanup of untagged container images from GitHub Container Registry.
# Reduces storage costs and maintains clean registry state.
#
# IMPORTANT: Multi-arch images have architecture-specific manifests that appear
# as "untagged" but are referenced by the main manifest index. The lgtm-ci
# reusable collects referenced digests and skips prune when collection fails.

'on':
  schedule:
    # Run weekly on Monday at 03:00 UTC
    - cron: '0 3 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (log only, no deletions)'
        required: false
        default: false
        type: boolean
      min_age_days:
        description: 'Minimum age in days before deletion (protects multi-arch deps)'
        required: false
        default: 7
        type: number

concurrency:
  group: ghcr-cleanup
  cancel-in-progress: false

permissions: {}

jobs:
  prune-untagged:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-ghcr-cleanup.yml@3d3e577c8e50e11ead6bd36cb559361d33796a9d # v0.47.1
    permissions:
      contents: read # checkout repo and lgtm-ci tooling sparse checkout
      packages: write # delete untagged GHCR package versions via Packages API
    with:
      package-name: py-lintro
      min-age-days: >-
        ${{ github.event_name != 'workflow_dispatch' && 7 || inputs.min_age_days }}
      dry-run: ${{ inputs.dry_run == true }}
      tooling-ref: '4aaefe64763b7841b6d92d94dc47185083d34c9a' # v0.46.0
      egress-policy: block
      egress-preset: github-tooling
      allowed-endpoints-mode: append
      allowed-endpoints: >
        ghcr.io:443
        pkg-containers.githubusercontent.com:443
      runner-image: ubuntu-24.04
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  prune-untagged-base:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-ghcr-cleanup.yml@3d3e577c8e50e11ead6bd36cb559361d33796a9d # v0.47.1
    permissions:
      contents: read # checkout repo and lgtm-ci tooling sparse checkout
      packages: write # delete untagged GHCR package versions via Packages API
    with:
      package-name: py-lintro-base
      min-age-days: >-
        ${{ github.event_name != 'workflow_dispatch' && 7 || inputs.min_age_days }}
      dry-run: ${{ inputs.dry_run == true }}
      tooling-ref: '4aaefe64763b7841b6d92d94dc47185083d34c9a' # v0.46.0
      egress-policy: block
      egress-preset: github-tooling
      allowed-endpoints-mode: append
      allowed-endpoints: >
        ghcr.io:443
        pkg-containers.githubusercontent.com:443
      runner-image: ubuntu-24.04
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
