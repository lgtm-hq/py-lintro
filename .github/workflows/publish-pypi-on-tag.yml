---
name: Publish - PyPI Production
# Publishes package to PyPI when version tags are pushed.
# Lint gate: docker-ci on main/PR (no duplicate quality on tag).
# Layout: lgtm-ci docs/python-release-publish.md (requires lgtm-ci v0.23.1+)

'on':
  push:
    tags:
      - '*.*.*'
      - v*.*.*
      - '*.*.*a*'
      - v*.*.*a*
      - '*.*.*b*'
      - v*.*.*b*
      - '*.*.*rc*'
      - v*.*.*rc*
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sbom:
    name: Generate and verify SBOM
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@4676e2737994e31cae7c7ef17d10d5106ae1c25a # v0.23.1
    with:
      target: .
      target-type: dir
      sbom-format: cyclonedx-json
      scan-vulnerabilities: true
      create-attestation: true
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        release-assets.githubusercontent.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        anchore.io:443
        get.anchore.io:443
        toolbox-data.anchore.io:443
        grype.anchore.io:443
        pipelines.actions.githubusercontent.com:443
        fulcio.sigstore.dev:443
        rekor.sigstore.dev:443
        timestamp.sigstore.dev:443
        tuf-repo-cdn.sigstore.dev:443
        sigstore-tuf-root.storage.googleapis.com:443
      tooling-ref: '4676e2737994e31cae7c7ef17d10d5106ae1c25a' # v0.23.1
    permissions:
      contents: read
      security-events: write
      id-token: write
      attestations: write

  pypi:
    name: Build and publish to PyPI
    needs: [sbom]
    if: >-
      github.ref_type == 'tag' &&
      !startsWith(github.ref_name, 'actions-v')
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-pypi-release.yml@4676e2737994e31cae7c7ef17d10d5106ae1c25a # v0.23.1
    permissions:
      contents: read
      id-token: write
      attestations: write
    with:
      python-version: '3.14'
      artifact-name: python-dist
      github-environment: pypi
      tooling-ref: '4676e2737994e31cae7c7ef17d10d5106ae1c25a' # v0.23.1
      egress-policy: block
      # lgtm-ci workflow-contract.md § PyPI publish (build + publish jobs)
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        release-assets.githubusercontent.com:443
        objects.githubusercontent.com:443
        github-releases.githubusercontent.com:443
        raw.githubusercontent.com:443
        uploads.github.com:443
        ghcr.io:443
        pkg-containers.githubusercontent.com:443
        pypi.org:443
        upload.pypi.org:443
        files.pythonhosted.org:443
        astral.sh:443
        releases.astral.sh:443
        fulcio.sigstore.dev:443
        rekor.sigstore.dev:443
        tuf-repo-cdn.sigstore.dev:443
        oauth2.sigstore.dev:443

  github-release:
    name: Create GitHub Release
    needs: [pypi]
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-github-release.yml@4676e2737994e31cae7c7ef17d10d5106ae1c25a # v0.23.1
    permissions:
      contents: write
    with:
      artifact-name: python-dist
      generate-release-notes: true
      tooling-ref: '4676e2737994e31cae7c7ef17d10d5106ae1c25a' # v0.23.1
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        uploads.github.com:443
        codeload.github.com:443
        release-assets.githubusercontent.com:443
        objects.githubusercontent.com:443

  homebrew-tap:
    name: Publish Homebrew Tap
    needs: [pypi, github-release]
    if: >-
      !startsWith(github.ref_name, 'actions-v') &&
      !contains(github.ref_name, 'a') &&
      !contains(github.ref_name, 'b') &&
      !contains(github.ref_name, 'rc')
    uses: ./.github/workflows/build-binary.yml
    permissions:
      contents: write
    with:
      release_tag: ${{ github.ref_name }}
      arch: universal
    secrets: inherit

  docker-publish:
    name: Publish Docker Images to GHCR
    needs: pypi
    # yamllint disable-line rule:line-length
    if: >-
      !startsWith(github.ref_name, 'actions-v') &&
      !contains(github.ref_name, 'a') &&
      !contains(github.ref_name, 'b') &&
      !contains(github.ref_name, 'rc')
    uses: ./.github/workflows/docker-build-publish.yml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
