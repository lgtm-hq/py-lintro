---
name: Publish - PyPI Production
# Publishes package to PyPI when version tags are pushed.
# Lint gate: docker-ci on main/PR (no duplicate quality on tag).
# Layout: lgtm-ci docs/python-release-publish.md (requires lgtm-ci v0.45.1+)

'on':
  push:
    tags:
      - '*.*.*'
      - v*.*.*
      - '*.*.*a*'
      - v*.*.*a*
      - '*.*.*b*'
      - v*.*.*b*
      - '*.*.*rc*'
      - v*.*.*rc*
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sbom:
    name: Generate and verify SBOM
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@a8b6e50f095c8eb1a49d60f4df71a552c460b211 # v0.45.1
    with:
      target: .
      target-type: dir
      sbom-format: cyclonedx-json
      scan-vulnerabilities: true
      create-attestation: true
      tooling-ref: 'a8b6e50f095c8eb1a49d60f4df71a552c460b211' # v0.45.1
      egress-policy: block
      egress-preset: sbom
    permissions:
      # read: checkout repo for SBOM generation
      contents: read
      # write: upload vulnerability findings to GitHub Security tab
      security-events: write
      # write: OIDC for SBOM attestation signing
      id-token: write
      # write: publish SBOM / build attestations
      attestations: write

  pypi-build:
    name: Build Python distribution
    needs: [sbom]
    if: >-
      github.ref_type == 'tag' &&
      !startsWith(github.ref_name, 'actions-v')
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-build-python-dist.yml@a8b6e50f095c8eb1a49d60f4df71a552c460b211 # v0.45.1
    permissions:
      # read: checkout and build sdist/wheel (reusable-build-python-dist)
      contents: read
    with:
      python-version: '3.14'
      artifact-name: python-dist
      tooling-ref: 'a8b6e50f095c8eb1a49d60f4df71a552c460b211' # v0.45.1
      egress-policy: block
      egress-preset: pypi
      allowed-endpoints-mode: append
      allowed-endpoints: >
        astral.sh:443
        releases.astral.sh:443
        github-releases.githubusercontent.com:443

  pypi-upload:
    name: Upload to PyPI
    needs: [pypi-build]
    if: >-
      github.ref_type == 'tag' &&
      !startsWith(github.ref_name, 'actions-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # read: download python-dist workflow artifact
      contents: read
      # write: OIDC JWT for PyPI trusted publishing (this workflow file)
      id-token: write
      # write: Sigstore provenance attestation after upload (best-effort)
      attestations: write
    steps:
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          # lgtm-ci workflow-contract.md § PyPI upload (OIDC)
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            pypi.org:443
            upload.pypi.org:443
            files.pythonhosted.org:443
            astral.sh:443
            releases.astral.sh:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            oauth2.sigstore.dev:443
      - name: Prepare PyPI upload
        id: prepare
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/prepare-pypi-upload@a8b6e50f095c8eb1a49d60f4df71a552c460b211 # v0.45.1
        with:
          artifact-name: python-dist
          python-version: '3.14'
          tooling-ref: 'a8b6e50f095c8eb1a49d60f4df71a552c460b211' # v0.45.1
      - name: Upload to PyPI
        # yamllint disable-line rule:line-length
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://upload.pypi.org/legacy/
          packages-dir: ${{ steps.prepare.outputs.dist-path }}
      - name: Attest build provenance
        continue-on-error: true
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.prepare.outputs.dist-path }}/*

  github-release:
    name: Create GitHub Release
    needs: [pypi-upload]
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-github-release.yml@a8b6e50f095c8eb1a49d60f4df71a552c460b211 # v0.45.1
    permissions:
      # write: create GitHub Release and upload dist assets
      contents: write
    with:
      artifact-name: python-dist
      generate-release-notes: true
      tooling-ref: 'a8b6e50f095c8eb1a49d60f4df71a552c460b211' # v0.45.1
      egress-policy: block
      egress-preset: github-tooling
      allowed-endpoints-mode: append
      allowed-endpoints: uploads.github.com:443

  homebrew-tap:
    name: Publish Homebrew Tap
    needs: [pypi-upload, github-release]
    if: >-
      !startsWith(github.ref_name, 'actions-v') &&
      !contains(github.ref_name, 'a') &&
      !contains(github.ref_name, 'b') &&
      !contains(github.ref_name, 'rc')
    uses: ./.github/workflows/build-binary.yml
    permissions:
      # write: push formula updates to Homebrew tap repository
      contents: write
    with:
      release_tag: ${{ github.ref_name }}
      arch: universal
    secrets: inherit

  docker-publish:
    name: Publish Docker Images to GHCR
    needs: [pypi-upload]
    # yamllint disable-line rule:line-length
    if: >-
      !startsWith(github.ref_name, 'actions-v') &&
      !contains(github.ref_name, 'a') &&
      !contains(github.ref_name, 'b') &&
      !contains(github.ref_name, 'rc')
    uses: ./.github/workflows/docker-build-publish.yml
    permissions:
      # read: checkout for Docker build context
      contents: read
      # write: push images to ghcr.io
      packages: write
      # write: OIDC for container image signing / provenance
      id-token: write
      # write: publish image attestations
      attestations: write
      # write: upload container scan results to Security tab
      security-events: write
