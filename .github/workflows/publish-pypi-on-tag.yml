---
name: Publish - PyPI Production
# Publishes package to PyPI when version tags are pushed.
# Lint gate: docker-ci on main/PR (no duplicate quality on tag).
# Layout: lgtm-ci docs/python-release-publish.md (requires lgtm-ci v0.45.1+)

'on':
  push:
    tags:
      - '*.*.*'
      - v*.*.*
      - '*.*.*a*'
      - v*.*.*a*
      - '*.*.*b*'
      - v*.*.*b*
      - '*.*.*rc*'
      - v*.*.*rc*
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  classify-tag:
    name: Classify release tag
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    runs-on: ubuntu-latest
    permissions:
      # read: sparse checkout of scripts for the classifier
      contents: read
    outputs:
      # true when github.ref_name is a prerelease (alpha/beta/rc or any
      # non-``X.Y.Z`` suffix); false for stable releases including +build
      # metadata. Consumed by Homebrew/npm/Docker gating below.
      is_prerelease: ${{ steps.classify.outputs.is_prerelease }}
    steps:
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
      - name: Checkout scripts
        # yamllint disable-line rule:line-length
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          sparse-checkout: scripts/ci/classify-release-tag.py
          sparse-checkout-cone-mode: false
      - name: Classify tag
        id: classify
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: python3 scripts/ci/classify-release-tag.py "$TAG_NAME"

  sbom:
    name: Generate and verify SBOM
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    with:
      target: .
      target-type: dir
      sbom-format: cyclonedx-json
      scan-vulnerabilities: true
      create-attestation: true
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: sbom
    permissions:
      # read: checkout repo for SBOM generation
      contents: read
      # write: upload vulnerability findings to GitHub Security tab
      security-events: write
      # write: OIDC for SBOM attestation signing
      id-token: write
      # write: publish SBOM / build attestations
      attestations: write

  pypi-build:
    name: Build Python distribution
    needs: [sbom]
    if: >-
      github.ref_type == 'tag' &&
      !startsWith(github.ref_name, 'actions-v')
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-build-python-dist.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    permissions:
      # read: checkout and build sdist/wheel (reusable-build-python-dist)
      contents: read
    with:
      python-version: '3.14'
      artifact-name: python-dist
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: pypi
      allowed-endpoints-mode: append
      allowed-endpoints: >
        astral.sh:443
        releases.astral.sh:443
        github-releases.githubusercontent.com:443

  pypi-upload:
    name: Upload to PyPI
    needs: [pypi-build]
    if: >-
      github.ref_type == 'tag' &&
      !startsWith(github.ref_name, 'actions-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      # read: download python-dist workflow artifact
      contents: read
      # write: OIDC JWT for PyPI trusted publishing (this workflow file)
      id-token: write
      # write: Sigstore provenance attestation after upload (best-effort)
      attestations: write
    steps:
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          # lgtm-ci workflow-contract.md § PyPI upload (OIDC)
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            pypi.org:443
            upload.pypi.org:443
            files.pythonhosted.org:443
            astral.sh:443
            releases.astral.sh:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            oauth2.sigstore.dev:443
      - name: Prepare PyPI upload
        id: prepare
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/prepare-pypi-upload@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
        with:
          artifact-name: python-dist
          python-version: '3.14'
          tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      - name: Upload to PyPI
        # yamllint disable-line rule:line-length
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://upload.pypi.org/legacy/
          packages-dir: ${{ steps.prepare.outputs.dist-path }}
      - name: Attest build provenance
        continue-on-error: true
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.prepare.outputs.dist-path }}/*

  github-release:
    name: Create GitHub Release
    needs: [pypi-upload]
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-github-release.yml@66cad82ead0e5d119928c895c7d7da9c837989e5 # v0.52.3
    permissions:
      # write: create GitHub Release and upload dist assets
      contents: write
    with:
      artifact-name: python-dist
      generate-release-notes: true
      tooling-ref: '66cad82ead0e5d119928c895c7d7da9c837989e5' # v0.52.3
      egress-policy: block
      egress-preset: github-tooling
      allowed-endpoints-mode: append
      allowed-endpoints: uploads.github.com:443

  homebrew-tap:
    name: Publish Homebrew Tap
    needs: [classify-tag, pypi-upload, github-release]
    if: >-
      !startsWith(github.ref_name, 'actions-v') &&
      needs.classify-tag.outputs.is_prerelease == 'false'
    uses: ./.github/workflows/build-binary.yml
    permissions:
      # write: push formula updates to Homebrew tap repository
      contents: write
    with:
      release_tag: ${{ github.ref_name }}
      arch: universal
    secrets: inherit

  npm-publish:
    name: Publish to npm
    # Needs homebrew-tap: that job (build-binary.yml) uploads the four
    # platform binaries to the GitHub release, which publish-npm.yml
    # downloads. Gated to stable releases only, since build-binary does not
    # run for prereleases.
    needs: [classify-tag, homebrew-tap]
    if: >-
      !startsWith(github.ref_name, 'actions-v') &&
      needs.classify-tag.outputs.is_prerelease == 'false'
    uses: ./.github/workflows/publish-npm.yml
    permissions:
      # read: checkout and download release assets
      contents: read
      # write: OIDC for npm trusted publishing + provenance
      id-token: write
    with:
      release_tag: ${{ github.ref_name }}
    # No secrets: inherit — publishing is OIDC-only (id-token), and the
    # reusable workflow's GITHUB_TOKEN for release-asset download is provided
    # automatically. Avoids exposing all org/repo secrets to the call.

  docker-publish:
    name: Publish Docker Images to GHCR
    needs: [classify-tag, pypi-upload]
    # yamllint disable-line rule:line-length
    if: >-
      !startsWith(github.ref_name, 'actions-v') &&
      needs.classify-tag.outputs.is_prerelease == 'false'
    uses: ./.github/workflows/docker-build-publish.yml
    permissions:
      # read: checkout for Docker build context
      contents: read
      # write: push images to ghcr.io
      packages: write
      # write: OIDC for container image signing / provenance
      id-token: write
      # write: publish image attestations
      attestations: write
      # write: upload container scan results to Security tab
      security-events: write
