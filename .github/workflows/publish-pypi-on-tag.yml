---
name: Publish - PyPI Production
# Publishes package to PyPI when version tags are pushed.
# Validates tag matches pyproject.toml version, runs quality/build checks,
# generates SBOM, and uses OIDC for secure publishing.

'on':
  push:
    tags:
      - '*.*.*'
      - v*.*.*
      - '*.*.*a*'
      - v*.*.*a*
      - '*.*.*b*'
      - v*.*.*b*
      - '*.*.*rc*'
      - v*.*.*rc*
  workflow_dispatch:

permissions: {}

jobs:
  quality:
    # Skip workflow if triggered by internal action version tags
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    uses: ./.github/workflows/reusable-quality.yml
    permissions:
      contents: read

  build:
    needs: quality
    uses: ./.github/workflows/reusable-build.yml
    permissions:
      contents: read

  sbom:
    name: Generate and verify SBOM
    # SBOM runs in parallel - does own checkout and uses GitHub Dependency Graph API
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    uses: ./.github/workflows/reusable-sbom.yml
    permissions:
      contents: read
      actions: write
      id-token: write

  publish:
    name: Upload to PyPI
    needs: [build, quality, sbom]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    timeout-minutes: 20
    environment: pypi
    concurrency:
      group: pypi-tag-publish-${{ github.ref }}
      cancel-in-progress: true
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            uploads.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            pypi.org:443
            pypi.python.org:443
            upload.pypi.org:443
            files.pythonhosted.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            oauth2.sigstore.dev:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Environment setup
        uses: ./.github/actions/setup-env
        with:
          python-version: '3.14'
        env:
          # Skip external tools - publish only needs Python and uv
          BOOTSTRAP_SKIP_INSTALL_TOOLS: '1'
      - name: Ensure tag points to a commit on main
        run: bash scripts/ci/ensure-tag-on-main.sh

      - name: Verify tag matches pyproject version
        run: scripts/ci/verify-tag-matches-pyproject.sh

      - name: Build sdist and wheel
        run: uv run python -m build

      - name: Twine check
        run: uv run python -m twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        # yamllint disable-line rule:line-length
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          skip-existing: true
          verify-metadata: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*

  homebrew-tap:
    name: Publish Homebrew Tap
    needs: publish
    # Skip for pre-release tags and internal action version tags.
    if: >-
      ${{
        !startsWith(github.ref_name, 'actions-v') &&
        !contains(github.ref_name, 'a') &&
        !contains(github.ref_name, 'b') &&
        !contains(github.ref_name, 'rc')
      }}
    uses: ./.github/workflows/build-binary.yml
    permissions:
      contents: write
    with:
      release_tag: ${{ github.ref_name }}
      arch: universal
    secrets: inherit

  docker-publish:
    name: Publish Docker Images to GHCR
    needs: publish
    # Skip for pre-release tags and internal action version tags
    # yamllint disable-line rule:line-length
    if: ${{ !startsWith(github.ref_name, 'actions-v') && !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') && !contains(github.ref_name, 'rc') }}
    uses: ./.github/workflows/docker-build-publish.yml
    permissions:
      contents: read
      packages: write
      id-token: write
