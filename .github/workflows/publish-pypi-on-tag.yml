---
name: Publish - PyPI Production
# Publishes package to PyPI when version tags are pushed.
# Validates tag version and default-branch ancestry via lgtm-ci publish preflight.

'on':
  push:
    tags:
      - '*.*.*'
      - v*.*.*
      - '*.*.*a*'
      - v*.*.*a*
      - '*.*.*b*'
      - v*.*.*b*
      - '*.*.*rc*'
      - v*.*.*rc*
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-quality.yml@80dbd2fc1568963da3bc24c468ff2221ff71b904
    with:
      post-pr-comment: false
      tooling-ref: '80dbd2fc1568963da3bc24c468ff2221ff71b904'
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        ghcr.io:443
        pkg-containers.githubusercontent.com:443
    permissions:
      contents: read
      packages: read

  sbom:
    name: Generate and verify SBOM
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-sbom.yml@80dbd2fc1568963da3bc24c468ff2221ff71b904
    with:
      target: .
      target-type: dir
      sbom-format: cyclonedx-json
      scan-vulnerabilities: true
      create-attestation: true
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        release-assets.githubusercontent.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        anchore.io:443
        get.anchore.io:443
        toolbox-data.anchore.io:443
        pipelines.actions.githubusercontent.com:443
        fulcio.sigstore.dev:443
        rekor.sigstore.dev:443
        timestamp.sigstore.dev:443
        tuf-repo-cdn.sigstore.dev:443
        sigstore-tuf-root.storage.googleapis.com:443
      tooling-ref: '80dbd2fc1568963da3bc24c468ff2221ff71b904'
    permissions:
      contents: read
      security-events: write
      id-token: write
      attestations: write

  build-artifacts:
    name: Build Python distribution
    needs: [quality, sbom]
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            astral.sh:443
            releases.astral.sh:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: '80dbd2fc1568963da3bc24c468ff2221ff71b904'
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Preflight tag validation
        shell: bash
        env:
          STEP: preflight
          WORKING_DIRECTORY: .
          VERIFY_TAG_VERSION: 'true'
          ENSURE_TAG_ON_DEFAULT_BRANCH: 'true'
          DEFAULT_BRANCH: main
        run: bash .lgtm-ci-tooling/scripts/ci/actions/publish-pypi.sh
      - name: Environment setup
        uses: ./.github/actions/setup-env
        with:
          python-version: '3.14'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BOOTSTRAP_SKIP_INSTALL_TOOLS: '1'
      - name: Build sdist and wheel
        run: uv build
      - name: Upload Python distribution
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: python-dist
          path: dist/
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Upload to PyPI
    needs: [build-artifacts]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
      attestations: write
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            pypi.org:443
            upload.pypi.org:443
            files.pythonhosted.org:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            oauth2.sigstore.dev:443
      - name: Checkout lgtm-ci tooling
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: lgtm-hq/lgtm-ci
          path: .lgtm-ci-tooling
          ref: '80dbd2fc1568963da3bc24c468ff2221ff71b904'
          sparse-checkout: scripts/ci/
          sparse-checkout-cone-mode: true
          persist-credentials: false
      - name: Download Python distribution
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: python-dist
          path: dist
      - name: Validate distribution
        shell: bash
        env:
          STEP: validate-dist
          WORKING_DIRECTORY: .
        run: bash .lgtm-ci-tooling/scripts/ci/actions/publish-pypi.sh
      - name: Publish to PyPI
        # yamllint disable-line rule:line-length
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
      - name: Attest build provenance
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

  github-release:
    name: Create GitHub Release
    needs: [publish, build-artifacts]
    if: ${{ !startsWith(github.ref_name, 'actions-v') }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            uploads.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
      - name: Download Python distribution
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: python-dist
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*

  homebrew-tap:
    name: Publish Homebrew Tap
    needs: publish
    if: >-
      !startsWith(github.ref_name, 'actions-v') &&
      !contains(github.ref_name, 'a') &&
      !contains(github.ref_name, 'b') &&
      !contains(github.ref_name, 'rc')
    uses: ./.github/workflows/build-binary.yml
    permissions:
      contents: write
    with:
      release_tag: ${{ github.ref_name }}
      arch: universal
    secrets: inherit

  docker-publish:
    name: Publish Docker Images to GHCR
    needs: publish
    # yamllint disable-line rule:line-length
    if: >-
      !startsWith(github.ref_name, 'actions-v') &&
      !contains(github.ref_name, 'a') &&
      !contains(github.ref_name, 'b') &&
      !contains(github.ref_name, 'rc')
    uses: ./.github/workflows/docker-build-publish.yml
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
