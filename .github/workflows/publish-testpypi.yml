---
name: Publish - TestPyPI Staging

# Layout: lgtm-ci docs/python-release-publish.md (v0.32.3+)

'on':
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-testpypi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pypi-build:
    name: Build Python distribution
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-build-python-dist.yml@96a42109637efd4c019d176e0902e3be23295716 # v0.45.1
    permissions:
      # read: checkout and build sdist/wheel (reusable-build-python-dist)
      contents: read
    with:
      python-version: '3.14'
      verify-tag-version: false
      ensure-tag-on-default-branch: false
      artifact-name: python-dist
      tooling-ref: '96a42109637efd4c019d176e0902e3be23295716'  # v0.45.1
      egress-policy: block
      egress-preset: pypi
      allowed-endpoints-mode: append
      allowed-endpoints: >
        astral.sh:443
        releases.astral.sh:443
        github-releases.githubusercontent.com:443

  pypi-upload:
    name: Upload to TestPyPI
    needs: [pypi-build]
    runs-on: ubuntu-latest
    # Must match TestPyPI trusted publisher environment (same pattern as production
    # `environment: pypi`). Auto-created in GitHub if missing.
    environment: testpypi
    permissions:
      # read: download python-dist workflow artifact
      contents: read
      # write: OIDC JWT for TestPyPI trusted publishing (this workflow file)
      id-token: write
      # write: Sigstore provenance attestation after upload (best-effort)
      attestations: write
    steps:
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: block
          # lgtm-ci workflow-contract.md § PyPI upload (OIDC)
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            pypi.org:443
            upload.pypi.org:443
            files.pythonhosted.org:443
            test.pypi.org:443
            upload.test.pypi.org:443
            astral.sh:443
            releases.astral.sh:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            oauth2.sigstore.dev:443
      - name: Prepare PyPI upload
        id: prepare
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/prepare-pypi-upload@96a42109637efd4c019d176e0902e3be23295716 # v0.45.1
        with:
          artifact-name: python-dist
          python-version: '3.14'
          tooling-ref: '96a42109637efd4c019d176e0902e3be23295716'  # v0.45.1
      - name: Upload to TestPyPI
        # yamllint disable-line rule:line-length
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: ${{ steps.prepare.outputs.dist-path }}
      - name: Attest build provenance
        continue-on-error: true
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.prepare.outputs.dist-path }}/*
