---
name: Publish - TestPyPI Staging

'on':
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-publish-pypi.yml@4c36e28118ecf4f63df55e4a68b850d5e2697975
    with:
      test-pypi: true
      update-homebrew: false
      python-version: '3.14'
      tooling-ref: '4c36e28118ecf4f63df55e4a68b850d5e2697975'
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        release-assets.githubusercontent.com:443
        objects.githubusercontent.com:443
        pypi.org:443
        files.pythonhosted.org:443
        test.pypi.org:443
        upload.test.pypi.org:443
    permissions:
      contents: read
      id-token: write
      attestations: write
