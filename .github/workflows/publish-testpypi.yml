---
name: Publish - TestPyPI Staging

# Layout: lgtm-ci docs/python-release-publish.md (v0.45.1+)

'on':
  workflow_dispatch:

permissions: {}

concurrency:
  group: publish-testpypi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pypi-build:
    name: Build Python distribution
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-build-python-dist.yml@768a6b72f0a5346b5ecba3f4e13b90040472341c # v0.52.3
    permissions:
      # read: checkout and build sdist/wheel (reusable-build-python-dist)
      contents: read
    with:
      python-version: '3.14'
      verify-tag-version: false
      ensure-tag-on-default-branch: false
      artifact-name: python-dist
      tooling-ref: '768a6b72f0a5346b5ecba3f4e13b90040472341c' # v0.52.3
      egress-policy: block
      egress-preset: pypi
      # Full list (v0.50.0+ replace semantics): the reusable passes
      # allowed-endpoints verbatim to step-security/harden-runner, so a
      # non-empty value must include the pypi preset baseline.
      allowed-endpoints-mode: replace
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        pipelines.actions.githubusercontent.com:443
        pypi.org:443
        files.pythonhosted.org:443
        test.pypi.org:443
        upload.pypi.org:443
        upload.test.pypi.org:443
        astral.sh:443
        releases.astral.sh:443
        github-releases.githubusercontent.com:443

  pypi-upload:
    name: Upload to TestPyPI
    needs: [pypi-build]
    runs-on: ubuntu-latest
    # Must match TestPyPI trusted publisher environment (same pattern as production
    # `environment: pypi`). Auto-created in GitHub if missing.
    environment: testpypi
    permissions:
      # read: download python-dist workflow artifact
      contents: read
      # write: OIDC JWT for TestPyPI trusted publishing (this workflow file)
      id-token: write
      # write: Sigstore provenance attestation after upload (best-effort)
      attestations: write
    steps:
      - name: Harden runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          # lgtm-ci workflow-contract.md § PyPI upload (OIDC)
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            actions.githubusercontent.com:443
            *.blob.core.windows.net:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            pypi.org:443
            upload.pypi.org:443
            files.pythonhosted.org:443
            test.pypi.org:443
            upload.test.pypi.org:443
            astral.sh:443
            releases.astral.sh:443
            fulcio.sigstore.dev:443
            rekor.sigstore.dev:443
            tuf-repo-cdn.sigstore.dev:443
            oauth2.sigstore.dev:443
      - name: Prepare PyPI upload
        id: prepare
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/prepare-pypi-upload@768a6b72f0a5346b5ecba3f4e13b90040472341c # v0.52.3
        with:
          artifact-name: python-dist
          python-version: '3.14'
          tooling-ref: '768a6b72f0a5346b5ecba3f4e13b90040472341c' # v0.52.3
      - name: Upload to TestPyPI
        # yamllint disable-line rule:line-length
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: ${{ steps.prepare.outputs.dist-path }}
      - name: Attest build provenance
        continue-on-error: true
        # yamllint disable-line rule:line-length
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.prepare.outputs.dist-path }}/*
