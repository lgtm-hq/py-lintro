---
name: Maintenance - PR Comment Cleanup
# Manual workflow to clean up automated comments from PRs (coverage reports, etc.).
# Helps maintain clean PR comment history by removing outdated bot comments.

'on':
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'Pull request number to clean comments on'
        required: true
        type: string

permissions: {}

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
      issues: write
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Environment setup
        uses: ./.github/actions/setup-env
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip external tools - this workflow only needs Python for scripts
          BOOTSTRAP_SKIP_INSTALL_TOOLS: '1'

      - name: Delete previous Coverage comments
        env:
          PR_NUMBER: ${{ inputs.pr-number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: scripts/ci/github/post-pr-delete-previous.sh '<!-- coverage-report -->'

      - name: Delete previous Lintro analysis comments
        env:
          PR_NUMBER: ${{ inputs.pr-number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: scripts/ci/github/post-pr-delete-previous.sh '<!-- lintro-report -->'
