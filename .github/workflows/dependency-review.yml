---
name: Security - Dependency Review

'on':
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

permissions: {}

concurrency:
  group: dependency-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-dependency-review.yml@768a6b72f0a5346b5ecba3f4e13b90040472341c # v0.52.3
    with:
      fail-on-severity: high
      tooling-ref: '768a6b72f0a5346b5ecba3f4e13b90040472341c' # v0.52.3
      egress-policy: block
      egress-preset: scorecard
      # Full list (v0.50.0+ replace semantics): the reusable passes
      # allowed-endpoints verbatim to step-security/harden-runner, so a
      # non-empty value must include the scorecard preset baseline.
      allowed-endpoints-mode: replace
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        uploads.github.com:443
        pipelines.actions.githubusercontent.com:443
        gcr.io:443
        api.osv.dev:443
        api.scorecard.dev:443
        api.securityscorecards.dev:443
        api.deps.dev:443
        release-assets.githubusercontent.com:443
    permissions:
      contents: read
      pull-requests: read
