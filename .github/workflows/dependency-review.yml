---
name: Security - Dependency Review
# Reviews dependency changes in PRs for known security vulnerabilities.
# Blocks merges if high-severity vulnerabilities are introduced.

'on':
  pull_request:

permissions: {}

jobs:
  review:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 5
    concurrency:
      group: dependency-review-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            api.deps.dev:443
            api.securityscorecards.dev:443
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # Run dependency review; disable PR comment on forks (token is read-only)
      # continue-on-error only for forks where Dependency Graph may not be enabled
      - name: Dependency review
        # yamllint disable-line rule:line-length
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261 # v4.8.2
        continue-on-error: ${{ github.event.pull_request.head.repo.fork == true }}
        with:
          fail-on-severity: high
          # Disable PR comments on forks where token is read-only
          # yamllint disable-line rule:line-length
          comment-summary-in-pr: ${{ github.event.pull_request.head.repo.fork == false }}
          allow-ghsas: true
          retry-on-snapshot-warnings: true
