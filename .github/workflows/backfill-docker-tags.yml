---
name: Backfill - Docker Semver Tags
# One-time workflow to build and push semver-tagged Docker images for all
# historical releases that were never published to GHCR.
# Delete this workflow after successful backfill.

'on':
  workflow_dispatch:
    inputs:
      batch:
        description: 'Batch number (1-6). Each batch covers ~25 releases.'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'
      dry-run:
        description: 'Dry run — build but do not push'
        required: false
        default: 'false'

permissions: {}

jobs:
  generate-matrix:
    name: Generate tag matrix for batch ${{ inputs.batch }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.tags }}
      count: ${{ steps.matrix.outputs.count }}
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Generate matrix from batch
        id: matrix
        env:
          BATCH: ${{ inputs.batch }}
        run: scripts/ci/backfill-generate-matrix.sh

  backfill:
    name: 'Build ${{ matrix.tag }}'
    needs: generate-matrix
    if: needs.generate-matrix.outputs.count != '0'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false
      max-parallel: 2
    steps:
      # Harden runner — cannot use composite action here because the
      # workspace will be checked out at a historical release tag where
      # .github/actions/ does not exist. Uses the same endpoint list as
      # docker-build-publish.yml.
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
            docker.io:443
            registry-1.docker.io:443
            auth.docker.io:443
            production.cloudflare.docker.com:443
            pypi.org:443
            files.pythonhosted.org:443
            static.rust-lang.org:443
            bun.sh:443
            astral.sh:443
            releases.astral.sh:443
            sh.rustup.rs:443
            deb.debian.org:80
            registry.npmjs.org:443
            crates.io:443
            static.crates.io:443
            index.crates.io:443
            semgrep.dev:443
            metrics.semgrep.dev:443

      # Checkout the release tag as the build context (must come first so the
      # CI scripts checkout below is not overwritten).
      - name: Checkout at release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ matrix.tag }}
          fetch-depth: 1

      # Sparse-checkout main for CI scripts (not available on old tags).
      # Must come AFTER the tag checkout — checking out the tag into the
      # default workspace wipes any prior content, but this step only
      # writes into _ci/ and does not touch the parent workspace.
      - name: Checkout CI scripts from main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          sparse-checkout: scripts/ci
          path: _ci

      # Cannot use ./.github/actions/setup-docker here — it does not
      # exist on old release tags.  Uses same raw actions as the
      # build-and-test job in docker-build-publish.yml.
      - name: Set up Docker Buildx
        # yamllint disable-line rule:line-length
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GHCR
        # yamllint disable-line rule:line-length
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute version and tags
        id: tags
        env:
          TAG: ${{ matrix.tag }}
          SHA: ${{ matrix.sha }}
        run: _ci/scripts/ci/backfill-compute-tags.sh

      - name: Build and push main image
        env:
          REPO: ghcr.io/lgtm-hq/py-lintro-buildcache
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: ${{ inputs.dry-run != 'true' }}
          tags: ${{ steps.tags.outputs.main-tags }}
          cache-from: type=registry,ref=${{ env.REPO }}:main
          # Provenance/SBOM disabled: creates untagged OCI child manifests that
          # ghcr_prune_untagged.py deletes, breaking tagged image indexes.
          provenance: false
          sbom: false

      - name: Build and push base image
        if: steps.tags.outputs.has-base == 'true'
        env:
          REPO: ghcr.io/lgtm-hq/py-lintro-base-buildcache
        # yamllint disable-line rule:line-length
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.base
          push: ${{ inputs.dry-run != 'true' }}
          tags: ${{ steps.tags.outputs.base-tags }}
          cache-from: type=registry,ref=${{ env.REPO }}:main
          # Provenance/SBOM disabled: same reason as above.
          provenance: false
          sbom: false
