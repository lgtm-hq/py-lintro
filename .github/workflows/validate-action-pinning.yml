---
name: Quality Check - Action Pinning Validation

'on':
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-action-pinning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-validate-action-pinning.yml@96a42109637efd4c019d176e0902e3be23295716 # v0.45.1
    with:
      tooling-ref: '96a42109637efd4c019d176e0902e3be23295716' # v0.45.1
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
