---
name: Quality Check - Action Pinning Validation
# Validates that external GitHub Actions are pinned to specific SHA commits for
# security compliance. Internal actions (lgtm-hq/py-lintro) use semantic
# version tags instead for easier maintenance.

'on':
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
      - 'scripts/ci/maintenance/validate-action-pinning.sh'
  workflow_dispatch:

permissions: {}

jobs:
  check-pinning:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    concurrency:
      group: validate-pinning-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            release-assets.githubusercontent.com:443
            objects.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - name: Scan workflows for non-pinned actions (enforcing)
        run: ENFORCE=1 bash scripts/ci/maintenance/validate-action-pinning.sh
