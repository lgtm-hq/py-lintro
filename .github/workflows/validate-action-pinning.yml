---
name: Quality Check - Action Pinning Validation

'on':
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-action-pinning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-validate-action-pinning.yml@9416eb2bf71539bcc355e1dcf463a533a0924d74 # v0.55.0
    with:
      tooling-ref: '9416eb2bf71539bcc355e1dcf463a533a0924d74' # v0.55.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
