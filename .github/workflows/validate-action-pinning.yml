---
name: Quality Check - Action Pinning Validation

'on':
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions: {}

concurrency:
  group: validate-action-pinning-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-validate-action-pinning.yml@3d3e577c8e50e11ead6bd36cb559361d33796a9d # v0.47.1
    with:
      tooling-ref: '4aaefe64763b7841b6d92d94dc47185083d34c9a' # v0.46.0
      egress-policy: block
      egress-preset: github-tooling
    permissions:
      contents: read
