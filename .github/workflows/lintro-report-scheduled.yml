---
name: Reporting - Scheduled Lintro Analysis
# Runs comprehensive lintro analysis weekly, after CI - Docker publish on main,
# or on manual dispatch. Uses the immutable sha-<commit> GHCR tag from publish.

'on':
  workflow_run:
    workflows: [CI - Docker]
    types: [completed]
    branches: [main]
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions: {}

jobs:
  lintro-report:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 20
    concurrency:
      group: report-${{ github.ref }}
      cancel-in-progress: true
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: >-
            ${{
              github.event_name == 'workflow_run'
              && github.event.workflow_run.head_sha
              || github.ref
            }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull lintro Docker image
        env:
          LINTRO_SHA: >-
            ${{
              github.event_name == 'workflow_run'
              && github.event.workflow_run.head_sha
              || ''
            }}
        run: scripts/ci/testing/pull-lintro-image.sh

      - name: Run Lintro on codebase
        run: ./scripts/ci/testing/lintro-report-generate.sh

      - name: Upload report artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: lintro-report
          path: lintro-report/report.md
          retention-days: 90

  notify:
    needs: lintro-report
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    if: success()

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Report status
        run: scripts/ci/ci-log.sh "Lintro report generated successfully"
