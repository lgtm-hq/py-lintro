---
name: Reporting - Scheduled Lintro Analysis
# Runs comprehensive lintro analysis weekly, after CI - Docker publish on main,
# or on manual dispatch. Uses the immutable sha-<commit> GHCR tag from publish.

'on':
  workflow_run:
    workflows: [CI - Docker]
    types: [completed]
    branches: [main]
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions: {}

jobs:
  lintro-report:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 20
    concurrency:
      group: report-${{ github.ref }}
      cancel-in-progress: true
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            ghcr.io:443
            pkg-containers.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: >-
            ${{
              github.event_name == 'workflow_run'
              && github.event.workflow_run.head_sha
              || github.ref
            }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull lintro Docker image
        env:
          LINTRO_SHA: >-
            ${{
              github.event_name == 'workflow_run'
              && github.event.workflow_run.head_sha
              || ''
            }}
        run: scripts/ci/testing/pull-lintro-image.sh

      - name: Run Lintro on codebase
        run: ./scripts/ci/testing/lintro-report-generate.sh

      - name: Upload report artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lintro-report
          path: lintro-report/report.md
          retention-days: 90

  notify:
    needs: lintro-report
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    timeout-minutes: 5
    if: success()

    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: 'block'
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Report status
        run: scripts/ci/ci-log.sh "Lintro report generated successfully"
