---
name: CI - Tests

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: test-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-python.yml@f469f4d5c187f0700ccec4c023152fb68ee3dc89 # v0.32.3
    with:
      publish-test-summary: false
      python-versions: '3.11,3.14'
      test-path: tests
      extras: 'full'
      extra-args: '-x --ignore=tests/integration'
      coverage: true
      coverage-format: xml
      coverage-threshold: 80
      upload-coverage: true
      draft-pr-skip: true
      job-name: Python Compatibility
      runner-image: ubuntu-24.04
      tooling-ref: 'f469f4d5c187f0700ccec4c023152fb68ee3dc89' # v0.32.3
      egress-policy: block
      egress-preset: pypi
      allowed-endpoints-mode: append
      allowed-endpoints: >
        astral.sh:443
        releases.astral.sh:443
    permissions:
      # v0.18.2 aggregate job needs actions:write for artifact merge
      actions: write
      contents: read
      pull-requests: write

  # Org ruleset (checks-py-lintro): test-suite-coverage / 🧪 Test Suite & Coverage
  test-suite-coverage:
    needs: test
    if: >-
      always() &&
      (
        github.event_name != 'pull_request' ||
        github.event.pull_request.draft == false
      )
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-required-check.yml@f469f4d5c187f0700ccec4c023152fb68ee3dc89 # v0.32.3
    permissions:
      contents: read
    with:
      tooling-ref: 'f469f4d5c187f0700ccec4c023152fb68ee3dc89' # v0.32.3
      job-name: '🧪 Test Suite & Coverage'
      runner-image: ubuntu-24.04
      upstream-result: ${{ needs.test.result }}
      passed-output: ${{ needs.test.outputs.passed }}
      egress-policy: block
      egress-preset: github-tooling

  stage-coverage-html:
    name: Stage coverage HTML for Pages bundle
    needs: test
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.test.outputs.passed == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden Runner
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/harden-runner@f469f4d5c187f0700ccec4c023152fb68ee3dc89 # v0.32.3
        with:
          egress-policy: block
          allowed-endpoints: >
            github.com:443
            api.github.com:443
            codeload.github.com:443
            objects.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            pypi.org:443
            files.pythonhosted.org:443
            astral.sh:443
            releases.astral.sh:443

      - name: Checkout
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/secure-checkout@f469f4d5c187f0700ccec4c023152fb68ee3dc89 # v0.32.3

      - name: Setup Python and uv
        # yamllint disable-line rule:line-length
        uses: lgtm-hq/lgtm-ci/.github/actions/setup-python@f469f4d5c187f0700ccec4c023152fb68ee3dc89 # v0.32.3
        with:
          python-version: '3.14'
          install-dependencies: 'true'
          install-extras: 'dev'

      - name: Download coverage artifact
        # yamllint disable-line rule:line-length
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-coverage
          path: coverage-report

      - name: Stage HTML coverage
        run: ./scripts/ci/testing/stage-python-coverage-html.sh

      - name: Upload Pages coverage HTML
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-html
          path: coverage-html/
          retention-days: 7
          if-no-files-found: error
