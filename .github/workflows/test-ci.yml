---
name: CI - Tests

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  workflow_dispatch:

permissions: {}

concurrency:
  group: test-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    # yamllint disable-line rule:line-length
    uses: lgtm-hq/lgtm-ci/.github/workflows/reusable-test-python.yml@d9b302c919efc84fc001e9f3ef63bc9061d04b8f
    with:
      post-pr-comment: true
      python-versions: '3.11,3.14'
      test-path: tests
      extras: 'full'
      extra-args: '-x --ignore=tests/integration'
      coverage: true
      coverage-format: xml
      coverage-threshold: 80
      upload-coverage: true
      draft-pr-skip: true
      job-name: Python Compatibility
      runner-image: ubuntu-24.04
      tooling-ref: 'd9b302c919efc84fc001e9f3ef63bc9061d04b8f'
      egress-policy: block
      allowed-endpoints: >
        github.com:443
        api.github.com:443
        codeload.github.com:443
        release-assets.githubusercontent.com:443
        objects.githubusercontent.com:443
        raw.githubusercontent.com:443
        pypi.org:443
        files.pythonhosted.org:443
        astral.sh:443
        releases.astral.sh:443
    permissions:
      contents: read
      pull-requests: write
